async function loadBookLibrary() {
  state.booksLoading = true; render();
  try {
    const recs = await fetchAll(TABLES.books, [], `{${BOOK_FIELD.active}} = TRUE()`);
    const bf = (r, name, id) => r.fields[name] !== undefined ? r.fields[name] : (r.fields[id] || '');
    state.books = recs.map(r => ({
      id:          r.id,
      title:       bf(r,'Title',BOOK_FIELD.title) || bf(r,'title',BOOK_FIELD.title) || '',
      bookId:      bf(r,'Book ID',BOOK_FIELD.bookId) || bf(r,'book_id',BOOK_FIELD.bookId) || '',
      isbn:        bf(r,'ISBN',BOOK_FIELD.isbn) || '',
      series:      bf(r,'Series / Collection',BOOK_FIELD.series) || '',
      author:      bf(r,'Author',BOOK_FIELD.author) || '',
      illustrator: bf(r,'Illustrator',BOOK_FIELD.illustrator) || '',
      publisher:   bf(r,'Publisher',BOOK_FIELD.publisher) || '',
      category:    bf(r,'Category',BOOK_FIELD.category) || '',
      genre:       bf(r,'Genre',BOOK_FIELD.genre) || '',
      ageGroup:    bf(r,'Age Group',BOOK_FIELD.ageGroup) || '',
      format:      bf(r,'Format',BOOK_FIELD.format) || '',
      montessori:  bf(r,'Montessori Link',BOOK_FIELD.montessori) || '',
      tags:        bf(r,'Tags',BOOK_FIELD.tags) || '',
      pages:       bf(r,'Pages',BOOK_FIELD.pages) || '',
      qtyOwned:    bf(r,'Qty Owned',BOOK_FIELD.qtyOwned) || 1,
      condition:   bf(r,'Condition',BOOK_FIELD.condition) || '',
      location:    bf(r,'Location',BOOK_FIELD.location) || '',
      notes:       bf(r,'Notes',BOOK_FIELD.notes) || '',
      dateAdded:   bf(r,'Date Added',BOOK_FIELD.dateAdded) || '',
    })).sort((a,b) => a.title.localeCompare(b.title));
    state.booksLoaded = true;
  } catch(e) {
    state.bookFormError = 'Failed to load books: ' + e.message;
  }
  state.booksLoading = false;
  render();
}

async function saveBook(formData, recordId) {
  state.bookFormSaving = true; state.bookFormError = ''; render();
  try {
    const fields = {
      [BOOK_FIELD.title]:       formData.title,
      [BOOK_FIELD.author]:      formData.author,
      [BOOK_FIELD.isbn]:        formData.isbn,
      [BOOK_FIELD.series]:      formData.series,
      [BOOK_FIELD.illustrator]: formData.illustrator,
      [BOOK_FIELD.publisher]:   formData.publisher,
      [BOOK_FIELD.category]:    formData.category,
      [BOOK_FIELD.genre]:       formData.genre,
      [BOOK_FIELD.ageGroup]:    formData.ageGroup,
      [BOOK_FIELD.format]:      formData.format,
      [BOOK_FIELD.montessori]:  formData.montessori,
      [BOOK_FIELD.tags]:        formData.tags,
      [BOOK_FIELD.pages]:       formData.pages ? parseInt(formData.pages) : null,
      [BOOK_FIELD.qtyOwned]:    formData.qtyOwned ? parseInt(formData.qtyOwned) : 1,
      [BOOK_FIELD.condition]:   formData.condition,
      [BOOK_FIELD.location]:    formData.location,
      [BOOK_FIELD.notes]:       formData.notes,
      [BOOK_FIELD.active]:      true,
    };
    // Remove null/empty fields
    Object.keys(fields).forEach(k => { if (fields[k] === '' || fields[k] === null) delete fields[k]; });

    if (recordId) {
      // Edit existing
      await airtable(`${TABLES.books}/${recordId}`, {
        method: 'PATCH', body: JSON.stringify({ fields }),
      });
      const idx = state.books.findIndex(b => b.id === recordId);
      if (idx >= 0) {
        state.books[idx] = { ...state.books[idx], ...formData, id: recordId };
        state.books.sort((a,b) => a.title.localeCompare(b.title));
      }
    } else {
      // Add new
      if (!formData.title) throw new Error('Title is required.');
      // Auto-generate Book ID for new books without ISBN
      if (!formData.isbn) {
        const nmsCount = state.books.filter(b => b.bookId.startsWith('NMS-B-')).length;
        fields[BOOK_FIELD.bookId] = `NMS-B-${String(nmsCount + 1).padStart(3,'0')}`;
      } else {
        fields[BOOK_FIELD.bookId] = `ISBN-${formData.isbn.replace(/\D/g,'')}`;
      }
      const today = todayET();
      fields[BOOK_FIELD.dateAdded] = today;
      const result = await airtable(TABLES.books, {
        method: 'POST', body: JSON.stringify({ records: [{ fields }] }),
      });
      const nr = result.records[0];
      state.books.push({
        id: nr.id, title: formData.title || '', bookId: fields[BOOK_FIELD.bookId] || '',
        isbn: formData.isbn || '', series: formData.series || '', author: formData.author || '',
        illustrator: formData.illustrator || '', publisher: formData.publisher || '',
        category: formData.category || '', genre: formData.genre || '',
        ageGroup: formData.ageGroup || '', format: formData.format || '',
        montessori: formData.montessori || '', tags: formData.tags || '',
        pages: formData.pages || '', qtyOwned: formData.qtyOwned || 1,
        condition: formData.condition || '', location: formData.location || '',
        notes: formData.notes || '', dateAdded: today,
      });
      state.books.sort((a,b) => a.title.localeCompare(b.title));
    }
    state.bookForm = null;
  } catch(e) {
    state.bookFormError = e.message;
  }
  state.bookFormSaving = false;
  render();
}

// MATERIALS CATALOG
// ═══════════════════════════════════════════════════════════════════════

const MAT_UNDERUSED_RATIO = 0.5;
const MAT_OVERUSED_RATIO  = 2.0;

const MAT_SUBJECT_CODE = {
  'Sensorial':      'SEN',
  'Language':       'LNG',
  'Math':           'MTH',
  'Practical Life': 'PRC',
  'Cultural':       'CUL',
  'Science':        'SCI',
  'Art':            'ART',
  'Music':          'MUS',
  'Motor':          'MOT',
};

function matUsageStatus(mat) {
  const qty  = mat.quantity || 0;
  const lnk  = (mat.linkedLessons || []).length;
  if (lnk === 0)                                   return 'unmapped';
  if (qty === 0)                                   return 'overused';
  const ratio = lnk / qty;
  if (ratio < MAT_UNDERUSED_RATIO)                 return 'underused';
  if (ratio <= MAT_OVERUSED_RATIO)                 return 'wellmapped';
  return 'overused';
}

function matStatusLabel(s)  { return {unmapped:'Unmapped',underused:'Under-used',wellmapped:'Well Mapped',overused:'Overused'}[s] || s; }
function matStatusColor(s)  { return {unmapped:'#888',underused:'#d97706',wellmapped:'#16a34a',overused:'#dc2626'}[s] || '#888'; }
function matStatusBg(s)     { return {unmapped:'#F5F5F5',underused:'#FEF3C7',wellmapped:'#DCFCE7',overused:'#FEE2E2'}[s] || '#F5F5F5'; }

function generateMaterialId(programs, subject) {
  const prog = (programs && programs.length > 0)
    ? (programs.length === 1 ? programs[0] : 'GEN')
    : 'GEN';
  const subjCode = MAT_SUBJECT_CODE[subject] || 'GEN';
  const prefix = `${prog}-${subjCode}-`;
  const existing = state.materials.filter(m => m.materialId && m.materialId.startsWith(prefix));
  const nextSeq  = existing.length + 1;
  return `${prefix}${String(nextSeq).padStart(3,'0')}`;
}

async function loadMaterials() {
  state.materialsLoading = true; render();
  try {
    const recs = await fetchAll(TABLES.materials, [], `{${FIELD.matActive}} = TRUE()`);
    state.materials = recs.map(r => {
      const f = r.fields;
      const raw = (k) => f[k] !== undefined ? f[k] : '';
      return {
        id:             r.id,
        name:           raw(FIELD.matName)        || raw('Name')        || '',
        materialId:     raw(FIELD.matId)          || raw('material_id') || '',
        programs:       raw(FIELD.matPrograms)    || raw('programs')    || [],
        subject:        raw(FIELD.matSubject)     || raw('subject')     || '',
        source:         raw(FIELD.matSource)      || raw('source')      || '',
        description:    raw(FIELD.matDescription) || raw('description') || '',
        quantity:       raw(FIELD.matQuantity)    || raw('quantity')    || 0,
        linkedLessons:  raw(FIELD.matLinkedLessons) || raw('linked_lessons') || [],
        notes:          raw(FIELD.matNotes)       || raw('notes')       || '',
        active:         raw(FIELD.matActive)      !== undefined ? raw(FIELD.matActive) : true,
      };
    }).sort((a,b) => a.name.localeCompare(b.name));
    state.materialsLoaded = true;
  } catch(e) {
    state.matFormError = 'Failed to load materials: ' + e.message;
  }
  state.materialsLoading = false;
  render();
}

async function saveMaterial(formData, recordId) {
  state.matFormSaving = true; state.matFormError = ''; render();
  try {
    const progs = formData.programs
      ? (Array.isArray(formData.programs) ? formData.programs : [formData.programs].filter(Boolean))
      : [];
    const fields = {
      [FIELD.matName]:        formData.name,
      [FIELD.matPrograms]:    progs,
      [FIELD.matSubject]:     formData.subject   || null,
      [FIELD.matSource]:      formData.source    || null,
      [FIELD.matDescription]: formData.description || null,
      [FIELD.matQuantity]:    formData.quantity ? parseInt(formData.quantity) : 0,
      [FIELD.matNotes]:       formData.notes     || null,
      [FIELD.matActive]:      true,
    };
    // Remove null fields
    Object.keys(fields).forEach(k => { if (fields[k] === null || fields[k] === '') delete fields[k]; });

    if (recordId) {
      await airtable(`${TABLES.materials}/${recordId}`, {
        method: 'PATCH', body: JSON.stringify({ fields }),
      });
      const idx = state.materials.findIndex(m => m.id === recordId);
      if (idx >= 0) {
        state.materials[idx] = {
          ...state.materials[idx],
          name:        formData.name        || '',
          programs:    progs,
          subject:     formData.subject     || '',
          source:      formData.source      || '',
          description: formData.description || '',
          quantity:    formData.quantity ? parseInt(formData.quantity) : 0,
          notes:       formData.notes       || '',
        };
        state.materials.sort((a,b) => a.name.localeCompare(b.name));
      }
    } else {
      if (!formData.name) throw new Error('Name is required.');
      const matId = generateMaterialId(progs, formData.subject);
      fields[FIELD.matId] = matId;
      const result = await airtable(TABLES.materials, {
        method: 'POST', body: JSON.stringify({ records: [{ fields }] }),
      });
      const nr = result.records[0];
      state.materials.push({
        id:           nr.id,
        name:         formData.name        || '',
        materialId:   matId,
        programs:     progs,
        subject:      formData.subject     || '',
        source:       formData.source      || '',
        description:  formData.description || '',
        quantity:     formData.quantity ? parseInt(formData.quantity) : 0,
        linkedLessons: [],
        notes:        formData.notes       || '',
        active:       true,
      });
      state.materials.sort((a,b) => a.name.localeCompare(b.name));
    }
    state.matForm = null;
  } catch(e) {
    state.matFormError = e.message;
  }
  state.matFormSaving = false;
  render();
}

function openMatPicker(mat) {
  state.matForm = null;            // close edit overlay if open
  const sel = {};
  (mat.linkedLessons || []).forEach(id => { sel[id] = true; });
  state.matPickerOpen       = mat.id;
  state.matPickerSearch     = '';
  state.matPickerProgFilter = 'All';
  state.matPickerSubjFilter = 'All';
  state.matPickerSelected   = sel;
  state.matPickerSaving     = false;
  render();
}

function closeMatPicker() {
  state.matPickerOpen = null;
  render();
}

async function saveMatLessons() {
  if (!state.matPickerOpen) return;
  state.matPickerSaving = true;
  render();
  try {
    const matId = state.matPickerOpen;
    const selectedIds = Object.keys(state.matPickerSelected).filter(k => state.matPickerSelected[k]);
    await airtable(`${TABLES.materials}/${matId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { [FIELD.matLinkedLessons]: selectedIds } })
    });
    const mat = state.materials.find(m => m.id === matId);
    if (mat) mat.linkedLessons = [...selectedIds];
    state.matPickerOpen = null;
  } catch(e) {
    alert('Error saving lesson links: ' + e.message);
  }
  state.matPickerSaving = false;
  render();
}

function openMatEdit(mat) {
  state.matPickerOpen = null;      // close picker if open
  state.matForm = { ...mat, programs: Array.isArray(mat.programs) ? [...mat.programs] : [] };
  state.matFormError = '';
  render();
}

// ─── Materials form save handler (wired in setupHandlers) ────────────────
function wireMaterialsForm() {
  const saveBtn = document.getElementById('mf-save-btn');
  if (!saveBtn) return;
  saveBtn.addEventListener('click', async () => {
    const f = state.matForm;
    if (!f) return;
    const progs = [];
    if (document.getElementById('mf-prog-IT')?.checked) progs.push('IT');
    if (document.getElementById('mf-prog-EC')?.checked) progs.push('EC');
    const formData = {
      name:        document.getElementById('mf-name')?.value?.trim()        || '',
      programs:    progs,
      subject:     document.getElementById('mf-subject')?.value             || '',
      quantity:    document.getElementById('mf-quantity')?.value            || 0,
      source:      document.getElementById('mf-source')?.value?.trim()      || '',
      description: document.getElementById('mf-description')?.value?.trim() || '',
      notes:       document.getElementById('mf-notes')?.value?.trim()       || '',
    };
    await saveMaterial(formData, f.id || null);
  });
}

// ─── Search input wiring ─────────────────────────────────────────────────
function wireMatSearch() {
  const inp = document.getElementById('mat-search');
  if (!inp) return;
  inp.addEventListener('input', function() {
    state.matSearch = this.value;
    const sel = this.selectionStart;
    render();
    const el2 = document.getElementById('mat-search');
    if (el2) { el2.focus(); el2.setSelectionRange(sel, sel); }
  });
}

// ─── Lesson picker wiring ────────────────────────────────────────────────
function wireMatPicker() {
  // Search input
  const searchEl = document.getElementById('mat-picker-search');
  if (searchEl) {
    searchEl.addEventListener('input', function() {
      state.matPickerSearch = this.value;
      const sel = this.selectionStart;
      render();
      const el2 = document.getElementById('mat-picker-search');
      if (el2) { el2.focus(); el2.setSelectionRange(sel, sel); }
    });
  }
  // Checkbox delegation — update state + DOM without full re-render
  const list = document.getElementById('mat-picker-list');
  if (list) {
    list.addEventListener('change', function(e) {
      const cb = e.target;
      if (cb.type !== 'checkbox' || !cb.dataset.actId) return;
      if (cb.checked) state.matPickerSelected[cb.dataset.actId] = true;
      else delete state.matPickerSelected[cb.dataset.actId];
      // Update count label and save button label in-place
      const cnt = Object.values(state.matPickerSelected).filter(Boolean).length;
      const countEl = document.getElementById('mat-picker-count');
      if (countEl) countEl.textContent = `${cnt} lesson${cnt!==1?'s':''} selected`;
      const saveBtn = document.getElementById('mat-picker-save');
      if (saveBtn && !state.matPickerSaving) saveBtn.textContent = `💾 Save ${cnt} Lesson${cnt!==1?'s':''}`;
      const lbl = cb.closest('label');
      if (lbl) lbl.style.background = cb.checked ? '#EFF6FF' : 'transparent';
    });
  }
  // Save button
  const saveBtn = document.getElementById('mat-picker-save');
  if (saveBtn) saveBtn.addEventListener('click', saveMatLessons);
}

// GENERAL OBSERVATIONS — student-level, not tied to any activity
// ═══════════════════════════════════════════════════════════════════════
async function loadGeneralObs(studentId) {
  try {
    const recs = await fetchAll(TABLES.generalObs, [], null);
    state.generalObservations = recs
      .filter(r => {
        // REST GET returns fields by name; field ID is a fallback
        const stus = r.fields['student'] || r.fields[FIELD.goStudent] || [];
        return stus.some(s => (typeof s === 'object' ? s.id : s) === studentId);
      })
      .map(r => {
        const recBy = r.fields['recorded_by'] || r.fields[FIELD.goRecordedBy] || [];
        const teacherId = Array.isArray(recBy) ? (typeof recBy[0] === 'object' ? recBy[0].id : recBy[0]) : '';
        const teacherName = (teacherId && state.staffById && state.staffById[teacherId]) || '';
        return {
          id: r.id,
          date: r.fields['observation_date'] || r.fields[FIELD.goDate] || '',
          notes: r.fields['notes'] || r.fields[FIELD.goNotes] || '',
          teacher: teacherName,
        };
      })
      .sort((a, b) => b.date.localeCompare(a.date));
  } catch(e) {
    state.generalObservations = [];
  }
}

function toggleGeneralObs() {
  state.generalObsOpen = !state.generalObsOpen;
  render();

async function saveGeneralObs() {
  const student = state.reviewStudent || state.selectedStudent;
  if (!student) return;
  const notesEl = document.getElementById('gen-obs-notes');
  const dateEl  = document.getElementById('gen-obs-date');
  const notes   = (notesEl ? notesEl.value : '').trim();
  const date    = dateEl ? dateEl.value : todayET();
  if (!notes) { alert('Please enter an observation note before saving.'); return; }
  state.generalObsSaving = true;
  const saveBtn = document.getElementById('gen-obs-save');
  if (saveBtn) { saveBtn.textContent = 'Saving…'; saveBtn.disabled = true; }
  try {
    const fields = {};
    fields[FIELD.goLabel]   = `${student.name} — ${date}`;
    fields[FIELD.goDate]    = date;
    fields[FIELD.goNotes]   = notes;
    fields[FIELD.goStudent] = [student.id];
    if (state.teacherRecordId) fields[FIELD.goRecordedBy] = [state.teacherRecordId];
    await airtable(TABLES.generalObs, { method: 'POST', body: JSON.stringify({ records: [{ fields }] }) });
    // Prepend to local state immediately
    state.generalObservations.unshift({ id: '', date, notes, teacher: state.teacherName || 'Staff' });
    if (notesEl) notesEl.value = '';
    if (saveBtn) { saveBtn.textContent = 'Save note'; saveBtn.disabled = false; }
    state.generalObsSaving = false;
    render();
  } catch(e) {
    state.generalObsSaving = false;
    if (saveBtn) { saveBtn.textContent = 'Save note'; saveBtn.disabled = false; }
    alert('Error saving observation: ' + e.message);
  }
}

// READING LOG — student-level book reading entries
// ═══════════════════════════════════════════════════════════════════════
async function loadReadingLogs(studentId) {
  try {
    // Books must be loaded to resolve titles in history entries.
    // Load them now if not yet fetched; wait if a load is already in flight.
    if (!state.booksLoaded && !state.booksLoading) {
      await loadBookLibrary();
    } else if (state.booksLoading) {
      await new Promise(resolve => {
        const t = setInterval(() => { if (!state.booksLoading) { clearInterval(t); resolve(); } }, 150);
      });
    }
    const recs = await fetchAll(TABLES.readingLog, [], null);
    state.readingLogs = recs
      .filter(r => {
        const stus = r.fields['student'] || r.fields[FIELD.rlStudent] || [];
        return stus.some(s => (typeof s === 'object' ? s.id : s) === studentId);
      })
      .map(r => {
        const recBy = r.fields['recorded_by'] || r.fields[FIELD.rlRecordedBy] || [];
        const teacherId = Array.isArray(recBy) ? (typeof recBy[0] === 'object' ? recBy[0].id : recBy[0]) : '';
        const teacherName = (teacherId && state.staffById && state.staffById[teacherId]) || '';
        const bookLinks = r.fields['book'] || r.fields[FIELD.rlBook] || [];
        const bookId = Array.isArray(bookLinks) ? (typeof bookLinks[0] === 'object' ? bookLinks[0].id : bookLinks[0]) : '';
        // resolve book title from state.books if loaded, else fallback to linked record name
        const bookObj = state.books.find(b => b.id === bookId);
        const bookTitle = bookObj ? bookObj.title
          : (Array.isArray(bookLinks) && typeof bookLinks[0] === 'object' ? bookLinks[0].value || '' : '');
        return {
          id: r.id,
          date: r.fields['log_date']      || r.fields[FIELD.rlDate]         || '',
          activityType: r.fields['activity_type'] || r.fields[FIELD.rlActivityType] || '',
          notes: r.fields['teacher_notes'] || r.fields[FIELD.rlNotes]       || '',
          bookId,
          bookTitle,
          teacher: teacherName,
        };
      })
      .sort((a, b) => b.date.localeCompare(a.date));
  } catch(e) {
    state.readingLogs = [];
  }
}

function toggleReadingLog() {
  state.readingLogOpen = !state.readingLogOpen;

async function saveReadingLog() {

  const date  = dateEl  ? dateEl.value  : todayET();

  const activityType = typeEl ? typeEl.value : state.readingLogActivityType;
  state.readingLogSaving = true;
  const saveBtn = document.getElementById('rl-save');
  if (saveBtn) { saveBtn.textContent = 'Saving…'; saveBtn.disabled = true; }
  try {
    const fields = {};
    fields[FIELD.rlLabel]        = `${student.name} — ${state.readingLogSelectedBook.title} — ${date}`;
    fields[FIELD.rlDate]         = date;
    fields[FIELD.rlActivityType] = activityType;
    fields[FIELD.rlNotes]        = notes;

    await airtable(TABLES.readingLog, { method: 'POST', body: JSON.stringify({ records: [{ fields }] }) });
    // Prepend to local state immediately
    state.readingLogs.unshift({
      id: '', date, activityType, notes,
      bookId: state.readingLogSelectedBook.id,
      bookTitle: state.readingLogSelectedBook.title,
      teacher: state.teacherName || 'Staff',

    state.readingLogSaving = false;
    if (saveBtn) { saveBtn.textContent = 'Log reading'; saveBtn.disabled = false; }
    alert('Error saving reading log: ' + e.message);
  }

function rlActivityBg(type) {

// ── Called when teacher clicks a book in the dropdown ──
// Re-entrancy guard: prevents focus→render→focus infinite loop.
// render() rebuilds the DOM and calls el.focus() on the new element,
// which would fire onfocus again — the guard stops the second call.
let _rlGuard = false;

function rlBookFocus() {
  if (_rlGuard) return;
  _rlGuard = true;
  state.readingLogBookDropdownOpen = true;
  render();
  const el2 = document.getElementById('rl-book-search');
  if (el2) el2.focus();
  _rlGuard = false;
}

function rlBookInput(el) {
  if (_rlGuard) return;
  _rlGuard = true;
  const sel = el.selectionStart;
  state.readingLogSelectedBook = null;
  state.readingLogBookSearch = el.value;
  state.readingLogBookDropdownOpen = true;
  render();
  const el2 = document.getElementById('rl-book-search');
  if (el2) { el2.focus(); el2.setSelectionRange(sel, sel); }
  _rlGuard = false;
}

// ── Portal dropdown — mounted on <body> so overflow:hidden on the
// Reading Log panel never clips it. Called from setupHandlers() after
// every render(), and directly from rlBookFocus/rlBookInput.
function positionRlDropdown() {
  const existing = document.getElementById('rl-book-dropdown');
  if (!state.readingLogBookDropdownOpen) { if (existing) existing.remove(); return; }
  const input = document.getElementById('rl-book-search');
  if (!input) { if (existing) existing.remove(); return; }
  const q = (state.readingLogBookSearch || '').toLowerCase();
  const filtered = (state.books || []).filter(b => !q || b.title.toLowerCase().includes(q));
  if (!filtered.length) { if (existing) existing.remove(); return; }
  const rect = input.getBoundingClientRect();
  // Use all available space below the input (viewport bottom minus a small margin)
  const spaceBelow = window.innerHeight - rect.bottom - 8;
  const dropHeight = Math.max(80, Math.min(320, spaceBelow));
  const el = existing || document.createElement('div');
  el.id = 'rl-book-dropdown';
  el.style.cssText = 'position:fixed;top:'+(rect.bottom+2)+'px;left:'+rect.left+'px;'
    +'width:'+rect.width+'px;z-index:9999;background:white;'
    +'border:1px solid #E0E0E0;border-radius:6px;max-height:'+dropHeight+'px;'
    +'overflow-y:auto;-webkit-overflow-scrolling:touch;'
    +'box-shadow:0 4px 16px rgba(0,0,0,0.14);';
  el.innerHTML = filtered.map(b => {
    const sid = b.id.replace(/'/g,"\\'");
    const stl = b.title.replace(/'/g,"\\'");
    // Build the metadata tag line (only non-empty fields)
    const tags = [b.genre, b.ageGroup, b.category].filter(Boolean);
    const tagHtml = tags.length
      ? '<div style="margin-top:2px;display:flex;gap:4px;flex-wrap:wrap">'
        + tags.map(t => '<span style="font-size:10px;padding:1px 6px;border-radius:10px;'
          +'background:#F0F0F0;color:#666;font-weight:500">'+t+'</span>').join('')
        + '</div>'
      : '';
    return '<div onmousedown="event.preventDefault()"'
      + ' onclick="rlSelectBook(\''+sid+'\',\''+stl+'\')"'
      + ' style="padding:9px 12px;cursor:pointer;border-bottom:0.5px solid #F5F5F5"'
      + ' onmouseover="this.style.background=\'#E6F1FB\'"'
      + ' onmouseout="this.style.background=\'\'">'
      + '<div style="font-size:13px;color:#1A1A1A;font-weight:500">'+b.title+'</div>'
      + tagHtml
      + '</div>';
  }).join('');
  if (!existing) document.body.appendChild(el);
}

function rlSelectBook(id, title) {
  state.readingLogSelectedBook    = { id, title };
  state.readingLogBookSearch      = title;

  // Remove portal dropdown immediately — no full render needed

// STATUS FILTER — click KPI card to filter activity list by status
// ═══════════════════════════════════════════════════════════════════════
// Returns activities for the student's CURRENT program only.
// For IT students: same-program loggedIds still bypass so history is never hidden.
// Returns the age-priority band for an activity given a child's age in decimal years and their current status.
// Bands: 'overdue' (ageMin ≤ childAge, not mastered), 'upcoming' (ageMin > childAge), 'mastered'
// Uses only ageMin — no ageMax needed. Null ageMin → treated as upcoming (conservative).
function getActivityBand(a, childAge, status) {
  if (status === 'Mastered') return 'mastered';
  if (a.ageMin == null) return 'upcoming';   // no age set — can't classify, show as upcoming
  return a.ageMin > childAge ? 'upcoming' : 'overdue';
}

// For EC students: no loggedIds bypass — prior IT activities live in getPriorProgramActivities().
function getProgramActivities(student) {
  const prog = (student && (typeof student.program === 'object' ? '' : student.program)) || '';
  if (!prog) return state.activities; // no program set — show all
  const IT_BANDS = ['Toddler (18m-3y)', 'Nido (0-18m)'];
  const EC_BANDS = ['Early (2.5-3.5)', 'Core (3.5-4.5)', 'Advanced (4.5-6)'];
  const isIT = prog.includes('Infant') || prog.includes('Toddler');
  const isEC = prog.includes('Early Childhood');
  if (isIT) {
    // IT: show IT activities + any logged activity (safety net for null-band edge cases)
    const loggedIds = new Set((state.reviewStatuses || []).map(r => r.activityId));
    return state.activities.filter(a =>
      a.ageBand == null || IT_BANDS.includes(a.ageBand) || loggedIds.has(a.id)
    );
  }
  if (isEC) {
    // EC: show EC activities only — no IT bleed
    return state.activities.filter(a => EC_BANDS.includes(a.ageBand));
  }
  return state.activities;
}

// Returns IT activities that have recorded progress for an EC student (shown via toggle).
function getPriorProgramActivities(student) {
  const prog = (student && (typeof student.program === 'object' ? '' : student.program)) || '';
  if (!prog.includes('Early Childhood')) return [];
  const IT_BANDS = ['Toddler (18m-3y)', 'Nido (0-18m)'];
  const loggedIds = new Set((state.reviewStatuses || []).map(r => r.activityId));
  return state.activities.filter(a =>
    (a.ageBand == null || IT_BANDS.includes(a.ageBand)) && loggedIds.has(a.id)
  );
}

function togglePriorProgram() {
  state.showPriorProgram = !state.showPriorProgram;
  render();
}

// ACTIVITY EXPANSION — load and show observation history inline
// ═══════════════════════════════════════════════════════════════════════
async function toggleActivityExpansion(actId) {
  var _sp = saveScroll();
  if (state.expandedActivityId === actId) {
    state.expandedActivityId = null;
    state.expandedHistory = [];
    render(); restoreScroll(_sp); return;
  }
  state.expandedActivityId = actId;
  state.expandedHistory = [];
  render(); restoreScroll(_sp);
  // Load Progress Records for this student + activity
  try {
    const prRecs = await fetchAll(TABLES.progress, [], null);
    const f = (r,n,id) => r.fields[n] !== undefined ? r.fields[n] : (r.fields[id] || '');
    var _sp3 = saveScroll();
    state.expandedHistory = prRecs
      .filter(r => {
        const studs = r.fields['student'] || r.fields[FIELD.prStudent] || [];
        const acts  = r.fields['activity'] || r.fields[FIELD.prActivity] || [];
        var student2 = state.reviewStudent || state.selectedStudent;
        return student2 && studs.includes(student2.id) && acts.includes(actId);
      })
      .map(r => ({
        id: r.id,
        status:   f(r,'status',FIELD.prStatus),
        date:     f(r,'record_date',FIELD.prDate),
        time:     toET(r.fields['created_time'] || r.createdTime || ''),
        fullTime: r.fields['created_time'] || r.createdTime || '',
        teacher: (function() {
          var ids = r.fields['recorded_by'] || r.fields[FIELD.prRecordedBy] || [];
          if (!Array.isArray(ids) || ids.length === 0) return 'Staff';
          var id = ids[0];
          if (id === state.teacherRecordId && state.teacherName) return state.teacherName;
          return (state.staffById || {})[id] || 'Staff';
        })(),
        teacherRaw: r.fields['recorded_by'] || r.fields[FIELD.prRecordedBy] || [],
        notes:    f(r,'observation_notes',FIELD.prNotes),
      }))
      .sort((a,b) => b.date.localeCompare(a.date) || b.fullTime.localeCompare(a.fullTime));
    // Resolve teacher names from state.students / staff IDs (best-effort)
    render();
  } catch(e) { console.warn('expansion error', e); }
}

// Strip leading "Ext." prefix from activity names for display
function cleanName(n) { return (n || '').replace(/^Ext\.\s*/i, ''); }

// Format a date string YYYY-MM-DD → "Jun 4, 2026"
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch(e) { return d; }
}

async function submitObservation(actId, actName, btn) {
  const statusEl = document.getElementById('obs-status-'+actId);
  const dateEl   = document.getElementById('obs-date-'+actId);
  const notesEl  = document.getElementById('obs-notes-'+actId);
  const notes = notesEl?.value?.trim() || '';
  const date  = dateEl?.value || todayET();
  // Observation is independent — use the current status from statusMap (don't require status selection)
  const currentStatus  = (state.reviewStatuses||[]).find(r=>r.activityId===actId)?.status
                       || state.statusMap?.[actId] || '';
  const status = currentStatus;
  if (!notes) { alert('Please enter observation notes.'); return; }
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const act = state.activities.find(a => a.id === actId);
    if (!act) throw new Error('Activity not found');
    const fields = {
      [FIELD.prStudent]:  [state.reviewStudent.id],
      [FIELD.prActivity]: [actId],
      [FIELD.prStatus]:   status,
      [FIELD.prDate]:     date,
    };
    if (notes.trim()) fields[FIELD.prNotes] = notes.trim();
    if (state.teacherRecordId) fields[FIELD.prRecordedBy] = [state.teacherRecordId];
    await airtable(TABLES.progress, { method:'POST', body: JSON.stringify({ records:[{fields}] }) });
    // Update SAS
    const compositeKey = `${state.reviewStudent.brightwheel}-${act.stableId}`;
    const existing = await fetchAll(TABLES.status, [], null);
    const match = existing.find(r => (r.fields['composite_key']||r.fields[FIELD.sasCompositeKey]||'') === compositeKey);
    if (match) {
      await airtable(`${TABLES.status}/${match.id}`, { method:'PATCH',
        body: JSON.stringify({ fields: { [FIELD.sasCurrent]: status, [FIELD.sasUpdated]: date } }) });
    } else {
      await airtable(TABLES.status, { method:'POST', body: JSON.stringify({ records:[{ fields:{
        [FIELD.sasStudent]:  [state.reviewStudent.id],
        [FIELD.sasActivity]: [actId],
        [FIELD.sasCurrent]:  status,
        [FIELD.sasUpdated]:  date,
        [FIELD.sasCompositeKey]: compositeKey,
      }}]})});
    }
    await loadReviewData(state.reviewStudent);
    state.expandedActivityId = actId;
    await toggleActivityExpansion(actId);
    await toggleActivityExpansion(actId); // re-expand with fresh data
  } catch(e) { btn.textContent='Save Observation'; btn.disabled=false; alert('Error: '+e.message); }
}

// ── PROMOTION ELIGIBILITY ────────────────────────────────────────────────────
async function loadPromotionData() {
  state.promotionLoading = true; render();
  try {
    const IT_BANDS = ['Toddler (18m-3y)', 'Nido (0-18m)'];
    const itActivities = state.activities.filter(a => IT_BANDS.includes(a.ageBand));
    const itActivityIds = new Set(itActivities.map(a => a.id));
    const subjectSet = [...new Set(itActivities.map(a => a.subject).filter(Boolean))];

    const sasRecs = await fetchAll(TABLES.status, [], null);

    // Build studentId → { activityId → status }
    const stuMap = {};
    sasRecs.forEach(r => {
      const studs = r.fields['student'] || r.fields[FIELD.sasStudent] || [];
      const acts  = r.fields['activity'] || r.fields[FIELD.sasActivity] || [];
      const cur   = r.fields['current_status'] || r.fields[FIELD.sasCurrent] || '';
      const stuId = typeof studs[0] === 'object' ? studs[0].id : studs[0];
      const actId = typeof acts[0] === 'object' ? acts[0].id : acts[0];
      if (!stuId || !actId || !itActivityIds.has(actId)) return;
      if (!stuMap[stuId]) stuMap[stuId] = {};
      stuMap[stuId][actId] = cur;
    });

    // Calculate per IT-student eligibility
    const itStudents = state.students.filter(s => {
      const p = (typeof s.program === 'object' ? '' : s.program) || '';
      return p.includes('Infant') || p.includes('Toddler');
    });

    state.promotionData = itStudents.map(s => {
      const statuses = stuMap[s.id] || {};
      const totalIT = itActivities.length;
      const masteredIds = itActivities.filter(a => statuses[a.id] === 'Mastered').length;
      const masteryPct = totalIT > 0 ? Math.round((masteredIds / totalIT) * 100) : 0;
      const ageDecimal = s.ageDecimal || 0;

      // Subject breakdown
      const subjects = subjectSet.map(subj => {
        const subjActs = itActivities.filter(a => a.subject === subj);
        const mastered = subjActs.filter(a => statuses[a.id] === 'Mastered').length;
        const workingWell = subjActs.filter(a => statuses[a.id] === 'Working Well').length;
        const pct = subjActs.length > 0 ? Math.round(((mastered) / subjActs.length) * 100) : 0;
        return { subject: subj, total: subjActs.length, mastered, workingWell, pct };
      }).filter(s => s.total > 0);

      const ageMet = ageDecimal >= 3.0;
      const masteryMet = masteryPct >= 80;
      const tier = ageMet && masteryMet ? 'ready' : (ageMet && masteryPct >= 65 ? 'borderline' : 'not-ready');

      return { student: s, masteryPct, totalIT, masteredIds, ageDecimal, ageMet, masteryMet, tier, subjects };
    }).sort((a, b) => {
      const order = { ready: 0, borderline: 1, 'not-ready': 2 };
      return (order[a.tier] - order[b.tier]) || b.masteryPct - a.masteryPct;
    });
  } catch(e) {
    console.warn('loadPromotionData error', e);
    state.promotionData = [];
  }
  state.promotionLoading = false; render();
}

async function confirmPromotion() {
  const ov = state.promotionOverlay;
  if (!ov) return;
  const btn = document.getElementById('promo-confirm-btn');
  if (btn) { btn.textContent = 'Promoting…'; btn.disabled = true; }
  try {
    await airtable(`${TABLES.students}/${ov.student.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ fields: { [FIELD.program]: 'Early Childhood (3-6)' } })
    });
    // Update local state
    const s = state.students.find(s => s.id === ov.student.id);
    if (s) s.program = 'Early Childhood (3-6)';
    // Remove from promotion candidates
    state.promotionData = (state.promotionData || []).filter(d => d.student.id !== ov.student.id);
    state.promotionOverlay = null;
    state.promotionNote = '';
    render();
  } catch(e) {
    if (btn) { btn.textContent = 'Confirm promotion'; btn.disabled = false; }
    alert('Promotion failed: ' + e.message);
  }
}

          ${adminField('Max Age','adm-agemax','number',fd.agemax||'3.5','e.g. 3.5','fd.agemax=this.value')}
        </div>
        ${adminSelect('Age Band','adm-ageband',['Early (2.5-3.5)','Core (3.5-4.5)','Advanced (4.5-6)','Nido (0-18m)','Toddler (18m-3y)'],fd.ageband||'Early (2.5-3.5)','fd.ageband=this.value')}
        <button class="btn btn-primary" onclick="adminSubmitActivity()" ${state.adminSubmitting?'disabled':''} style="margin-top:8px">
          ${state.adminSubmitting?'Saving…':'Save Activity'}</button>
      </div></div>`;
  }
  if (sub === 'activity-library') {
    const filter   = (state.activityLibraryFilter || '').toLowerCase();
    const expanded = state.activityLibraryExpanded || {};
    const IT_BANDS = ['Toddler (18m-3y)', 'Nido (0-18m)'];
    const EC_BANDS = ['Early (2.5-3.5)', 'Core (3.5-4.5)', 'Advanced (4.5-6)'];
    const itActs   = state.activities.filter(a => a.ageBand == null || IT_BANDS.includes(a.ageBand));
    const ecActs   = state.activities.filter(a => EC_BANDS.includes(a.ageBand));

    function matchesFilter(a) {
      if (!filter) return true;
      return (a.name||'').toLowerCase().includes(filter)
          || (a.subject||'').toLowerCase().includes(filter)
          || (a.category||'').toLowerCase().includes(filter);
    }

    function renderActivityRow(a) {
      const isEditing = state.activityEditId === a.id;
      if (isEditing) {
        return `
          <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F3E5F5;border-radius:8px;margin-bottom:4px">
            <input id="act-edit-input" value="${(state.activityEditValue||'').replace(/"/g,'&quot;')}"
              oninput="state.activityEditValue=this.value"
              style="flex:1;padding:6px 10px;border:1.5px solid #9C27B0;border-radius:6px;font-size:13px;outline:none">
            <button id="act-edit-save"
              style="padding:6px 14px;background:#6A1B9A;color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap"
              onclick="adminSaveActivityName('${a.id}')">
              ${state.activityEditSaving ? 'Saving…' : 'Save'}
            </button>
            <button onclick="state.activityEditId=null;state.activityEditValue='';render()"
              style="padding:6px 10px;background:white;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer">
              Cancel
            </button>
          </div>`;
      }
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:white;border-radius:8px;margin-bottom:4px;box-shadow:0 1px 2px rgba(0,0,0,.05)">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:#212121;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name || '—'}</div>
            ${a.category ? `<div style="font-size:11px;color:#aaa">${a.category}${a.ageBand ? ' · ' + a.ageBand : ''}</div>` : (a.ageBand ? `<div style="font-size:11px;color:#aaa">${a.ageBand}</div>` : '')}
          </div>
          <button onclick="state.activityEditId='${a.id}';state.activityEditValue=state.activities.find(x=>x.id==='${a.id}')?.name||'';state.activityEditSaving=false;render()"
            style="padding:5px 10px;background:#F3E5F5;color:#6A1B9A;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">
            ✏️ Rename
          </button>
        </div>`;
    }

    function renderProgram(progLabel, progKey, acts) {
      // Group by subject
      const bySubject = {};
      acts.forEach(a => {
        const s = a.subject || 'Other';
        if (!bySubject[s]) bySubject[s] = [];
        bySubject[s].push(a);
      });

      const subjectBlocks = Object.entries(bySubject).map(([subj, subActs]) => {
        const visibleActs = filter ? subActs.filter(matchesFilter) : subActs;
        if (filter && !visibleActs.length) return '';           // hide empty subjects when searching
        const key     = progKey + ':' + subj;
        const isOpen  = filter ? true : !!expanded[key];       // auto-expand all when searching
        const display = filter ? visibleActs : subActs;
        const countLabel = filter
          ? `${visibleActs.length} / ${subActs.length}`
          : `${subActs.length}`;
        return `
          <div style="margin-bottom:6px">
            <div data-acclibkey="${key.replace(/"/g,'&quot;')}"
              style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:white;
                     border-left:3px solid #9C27B0;border-radius:8px;cursor:pointer;
                     box-shadow:0 1px 3px rgba(0,0,0,.06);user-select:none"
              onmouseover="this.style.background='#FAF5FF'" onmouseout="this.style.background='white'">
              <span style="font-size:10px;color:#9C27B0;width:12px;text-align:center">${isOpen ? '▼' : '▶'}</span>
              <span style="font-size:13px;font-weight:700;color:#212121;flex:1">${subj}</span>
              <span style="font-size:11px;color:#aaa;background:#F5F5F5;padding:2px 8px;border-radius:10px">
                ${countLabel} activit${subActs.length===1?'y':'ies'}
              </span>
            </div>
            ${isOpen ? `<div style="padding:6px 0 2px 12px">${display.map(renderActivityRow).join('')}</div>` : ''}
          </div>`;
      }).join('');

      const totalVisible = acts.filter(matchesFilter).length;
      if (filter && !totalVisible) return '';

      return `
        <div style="margin-bottom:28px">
          <div style="font-size:11px;font-weight:800;color:#6A1B9A;text-transform:uppercase;
                      letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
            ${progLabel}
            <span style="font-size:10px;color:#aaa;font-weight:400;text-transform:none;letter-spacing:0">
              ${filter ? totalVisible + ' of ' + acts.length : acts.length} activities
            </span>
          </div>
          ${subjectBlocks || '<div style="color:#aaa;font-size:13px;padding:8px">No matches</div>'}
        </div>`;
    }

    const itBlock = renderProgram('Infant &amp; Toddler', 'IT', itActs);
    const ecBlock = renderProgram('Early Childhood',      'EC', ecActs);

    return `<div class="main">
      <button class="back-btn" onclick="state.adminSubScreen='menu';state.activityEditId=null;state.activityLibraryFilter='';state.activityLibraryExpanded={};state.error='';render()" style="margin-bottom:16px">← Back</button>
      <div style="font-size:16px;font-weight:800;color:#1A1A1A;margin-bottom:4px">✏️ Activity Library</div>
      <div style="font-size:13px;color:#888;margin-bottom:16px">Open a subject to browse activities. Use search to find by name, subject or category.</div>
      ${err}
      <input id="act-lib-search" value="${state.activityLibraryFilter||''}"
        placeholder="Search by name, subject, or category…"
        style="width:100%;padding:10px 14px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:13px;outline:none;margin-bottom:16px;box-sizing:border-box">
      ${(!itBlock && !ecBlock)
        ? `<div style="text-align:center;color:#aaa;padding:24px;font-size:13px">No activities match "${state.activityLibraryFilter}"</div>`
        : itBlock + ecBlock
      }
    </div>`;
  }

  return '<div class="main"><p>Unknown admin screen</p></div>';
}

function adminField(label, id, type, value, hint, onChange) {
  const fd = 'state.adminFormData';
  return `<div style="margin-bottom:12px">
    <label style="display:block;font-size:12px;font-weight:700;color:#333;margin-bottom:4px">${label}</label>
    <input type="${type}" id="${id}" value="${value}"
      oninput="${fd}.${id.replace('adm-','')}=this.value"
      style="width:100%;padding:9px 12px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:13px;outline:none">
    ${hint?`<div style="font-size:11px;color:#aaa;margin-top:3px">${hint}</div>`:''}
  </div>`;
}
function adminSelect(label, id, options, selected, onChange) {
  const opts = options.map(o=>`<option value="${o}" ${o===selected?'selected':''}>${o}</option>`).join('');
  return `<div style="margin-bottom:12px">
    <label style="display:block;font-size:12px;font-weight:700;color:#333;margin-bottom:4px">${label}</label>
    <select id="${id}" onchange="${onChange}" style="width:100%;padding:9px 12px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:13px;outline:none">${opts}</select>
  </div>`;
}

  state.adminSubmitting=true; state.error=''; render();

      [FIELD.staffName]:  name,

    }}]})});
    state.adminSubmitting=false; state.adminSubScreen='menu';
    state.error='';
    alert(`✅ Teacher "${name}" added successfully!\n\nRemember to:\n1. Invite them as a collaborator in Airtable with this email\n2. Assign their classroom in the Staff table`);

async function adminSubmitStudent() {
  const fname = document.getElementById('adm-fname')?.value?.trim();
  const lname = document.getElementById('adm-lname')?.value?.trim();
  const dob   = document.getElementById('adm-dob')?.value;
  const prog  = document.getElementById('adm-program')?.value;
  const enroll= document.getElementById('adm-enroll')?.value;
  const p1name= document.getElementById('adm-p1name')?.value?.trim()||'';
  const p1email=document.getElementById('adm-p1email')?.value?.trim()||'';
  const p1phone=document.getElementById('adm-p1phone')?.value?.trim()||'';
  const allerg= document.getElementById('adm-allergies')?.value?.trim()||'';
  const doctor= document.getElementById('adm-doctor')?.value?.trim()||'';
  if (!fname||!lname) { state.error='First and last name are required.'; render(); return; }
  state.adminSubmitting=true; state.error=''; render();
  try {
    const fields = {
      [FIELD.studentName]: `${fname} ${lname}`,
      [FIELD.firstNameF||'fldxn8d8wE5R3Kt5K']: fname,
      [FIELD.lastNameF||'flde4v53ZnljFuFzG']:  lname,
      [FIELD.program]:  prog,
      [FIELD.enrollStatus]: 'Active',
    };
    if (dob)    fields[FIELD.birthdate||'fldmMZakwgG7fRp42'] = dob;
    if (enroll) fields[FIELD.enrollDate||'fldjuvTlEfxst2boM'] = enroll;
    if (p1name) fields[FIELD.parent1Name||'fldnSIEc9Z0CdAZPL'] = p1name;
    if (p1email)fields[FIELD.parent1Email||'fldBeMFNurbReAfmu'] = p1email;
    if (p1phone)fields[FIELD.parent1Phone||'fldUzKKsxKbZsVSdN'] = p1phone;
    if (allerg) fields[FIELD.allergies] = allerg;
    if (doctor) fields['fldaAXS98Ye63N90J'] = doctor;
    await airtable(TABLES.students, { method:'POST', body: JSON.stringify({ records:[{fields}]})});
    // Reload students
    await loadData();
    state.mode='admin'; state.screen='admin'; state.adminSubScreen='menu'; state.adminSubmitting=false;
    alert(`✅ Student "${fname} ${lname}" added!\n\nAssign their homeroom classroom in Airtable → Students table.`);
    render();
  } catch(e) { state.adminSubmitting=false; state.error=e.message; render(); }

async function adminSubmitActivity() {
  const actname = document.getElementById('adm-actname')?.value?.trim();
  let subject  = document.getElementById('adm-subject')?.value;
  const newSub = document.getElementById('adm-newsubject')?.value?.trim();
  const cat    = document.getElementById('adm-category')?.value?.trim();
  const sid    = document.getElementById('adm-stableid')?.value?.trim();
  const prog   = document.getElementById('adm-actprogram')?.value;
  const amin   = parseFloat(document.getElementById('adm-agemin')?.value||'2.5');
  const amax   = parseFloat(document.getElementById('adm-agemax')?.value||'3.5');
  const aband  = document.getElementById('adm-ageband')?.value;
  if (subject === '+ New Subject') subject = newSub;
  if (!actname||!subject||!sid) { state.error='Activity name, subject, and stable ID are required.'; render(); return; }
  state.adminSubmitting=true; state.error=''; render();
  try {
    await airtable(TABLES.activities, { method:'POST',
      body: JSON.stringify({ records:[{ fields:{
        [FIELD.activityName]: actname,
        [FIELD.stableId]:     sid,
        [FIELD.subjectArea]:  subject,
        [FIELD.category]:     cat||'',
        [FIELD.ageMin]:       amin,
        [FIELD.ageMax]:       amax,
        [FIELD.ageBand||'fld7Nd4WPnxYPmB61']: aband,
        [FIELD.isActive]:     true,
        [FIELD.seqOrder]:     999,
      }}]}),
      // typecast allows new select options
    });
    await loadData();
    state.mode='admin'; state.screen='admin'; state.adminSubScreen='menu'; state.adminSubmitting=false;
    alert(`✅ Activity "${actname}" added to ${subject}!`);
    render();
  } catch(e) { state.adminSubmitting=false; state.error=e.message; render(); }
}

async function adminSaveActivityName(activityId) {
  const newName = (state.activityEditValue || '').trim();
  if (!newName) { state.error = 'Activity name cannot be empty.'; render(); return; }
  const activity = state.activities.find(a => a.id === activityId);
  if (!activity) return;
  if (newName === activity.name) { state.activityEditId = null; render(); return; }

  state.activityEditSaving = true;
  state.error = '';
  render();

  try {
    await airtable(`${TABLES.activities}/${activityId}`, {
      method: 'PATCH',
      body: JSON.stringify({ fields: { [FIELD.activityName]: newName } }),
    });
    // Update local state immediately so the list reflects the change
    activity.name = newName;
    state.activityEditId    = null;
    state.activityEditValue = '';
    state.activityEditSaving = false;
    render();
  } catch(e) {
    state.activityEditSaving = false;
    state.error = 'Save failed: ' + e.message;
    render();
  }
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// NEWTON AI ASSISTANT
// ═══════════════════════════════════════════════════════════════
window._ai = {
  open: false,
  messages: [],
  loading: false,
  listening: false,
  tts: false,
  msgCount: 0,
};

// ── AI progress data cache ───────────────────────────────────────
window._aiProgressData = null;

window.loadAIProgressData = async function() {
  if (window._aiProgressData) return;
  try {
    const sasRecs = await fetchAll(TABLES.status, [], null);
    const data = {};
    sasRecs.forEach(r => {
      const sid = (r.fields['student'] || r.fields[FIELD.sasStudent] || [])[0];
      const aid = (r.fields['activity'] || r.fields[FIELD.sasActivity] || [])[0];
      const status = r.fields['current_status'] || r.fields[FIELD.sasCurrent] || '';
      const date   = r.fields['last_updated_date'] || r.fields[FIELD.sasUpdated] || '';
      if (sid && aid && status) {
        if (!data[sid]) data[sid] = {};
        data[sid][aid] = { status, date };
      }
    });
    window._aiProgressData = data;
    console.log('AI: loaded progress data for', Object.keys(data).length, 'students');
  } catch(e) {
    window._aiProgressData = {};
    console.warn('AI: could not load progress data', e);
  }
};

// ── Build context for Claude ────────────────────────────────────
window.buildAIContext = function() {
  var today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var students = state.students || [];
  var activities = state.activities || [];
  var pd = window._aiProgressData || {};

  var studentLines = students.map(function(s) {
    var sts = pd[s.id] || {};
    var counts = { Mastered:0, 'Working Well':0, 'In Progress':0, Presented:0 };
    Object.values(sts).forEach(function(e) { if (counts[e.status] !== undefined) counts[e.status]++; });
    var total = Object.keys(sts).length;
    var allergy = (s.allergies && !['none','no',''].includes((s.allergies||'').toLowerCase().trim()))
      ? ' ALLERGY:' + s.allergies : '';
    var prog = total > 0
      ? ' | ' + counts['Mastered'] + ' mastered, ' + counts['Working Well'] + ' working well, ' + counts['In Progress'] + ' in progress, ' + counts['Presented'] + ' presented (' + total + ' logged)'
      : ' | No progress logged yet';
    return '- ' + s.name + ' (' + s.ageDisplay + ', ' + (s.program||'') + ')' + allergy + prog;
  });

  var subjects = [...new Set(activities.map(function(a){return a.subject;}).filter(Boolean))].join(', ');
  var totalLogged = Object.values(pd).reduce(function(n,v){return n+Object.keys(v).length;},0);

  return 'You are Newton, an AI assistant for Newton Montessori school in Edison, NJ.' +
    ' You help staff understand student progress, give Montessori insights, and suggest next steps.' +
    '\n\nTODAY: ' + today +
    '\nCURRENT USER: ' + state.teacherName + ' (' + (state.teacherRole||'Staff') + ')' +
    '\nSCHOOL: Newton Montessori, 1876 Route 27, Edison NJ 08817' +
    '\n\nACTIVE STUDENTS (' + students.length + '):\n' + studentLines.join('\n') +
    '\n\nCURRICULUM: ' + activities.length + ' activities across: ' + subjects +
    '\nPROGRESS RECORDS LOADED: ' + totalLogged +
    '\n\nYou have FULL access to each student progress data. Use it confidently.' +
    '\nBe concise and actionable. Use Montessori terminology. Suggest specific next activities.' +
    '\nFlag allergies when relevant. Identify students needing attention (stale or no progress).';
};

// ── Get detailed per-student context ────────────────────────────
window.getStudentContext = function(query) {
  var q = query.toLowerCase();
  var matches = (state.students||[]).filter(function(s) {
    return s.name.toLowerCase().split(' ').some(function(w) {
      return w.length > 2 && q.includes(w.toLowerCase());
    });
  });
  if (!matches.length) return '';

  var pd = window._aiProgressData || {};
  var ctx = '\n\nDETAILED STUDENT DATA:';

  matches.forEach(function(s) {
    ctx += '\n\n' + s.name + ' (' + s.ageDisplay + ', ' + s.ageBand + ', ' + s.program + '):';
    if (s.allergies && !['none','no',''].includes((s.allergies||'').toLowerCase().trim()))
      ctx += '\n  ALLERGY: ' + s.allergies;
    var sts = pd[s.id] || {};
    if (!Object.keys(sts).length) { ctx += '\n  No activities logged yet.'; return; }
    var bySubject = {};
    Object.entries(sts).forEach(function(entry) {
      var aid = entry[0]; var val = entry[1];
      var act = (state.activities||[]).find(function(a){return a.id===aid;});
      if (!act) return;
      var sub = act.subject || 'Other';
      if (!bySubject[sub]) bySubject[sub] = [];
      bySubject[sub].push(cleanName(act.name) + ': ' + val.status + (val.date?' ('+val.date.slice(5)+')':''));
    });
    Object.entries(bySubject).forEach(function(subEntry) {
      var sub = subEntry[0]; var items = subEntry[1];
      ctx += '\n  ' + sub + ' (' + items.length + ' activities):';
      items.forEach(function(item){ ctx += '\n    - ' + item; });
    });
  });
  return ctx;
};

// ── Call Claude API ─────────────────────────────────────────────
window.callClaude = async function(userMessage) {
  const apiKey = localStorage.getItem('nm_claude_key') || '';
  if (!apiKey) throw new Error('No API key. Please add your Anthropic API key in settings.');

  const systemPrompt = window.buildAIContext() + window.getStudentContext(userMessage);

  // Build messages array (keep last 10 turns for context)
  const recentMsgs = window._ai.messages.slice(-10).map(m => ({
    role: m.role, content: m.content
  }));
  recentMsgs.push({ role: 'user', content: userMessage });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: systemPrompt,
      messages: recentMsgs,
    }),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({error:{message:'API error '+resp.status}}));
    throw new Error(err.error?.message || 'API request failed');
  }

  const data = await resp.json();
  return data.content[0].text;
};

// ── Render chat panel ────────────────────────────────────────────
window.renderAIPanel = function() {
  const apiKey = localStorage.getItem('nm_claude_key') || '';
  const panel = document.getElementById('ai-panel');
  if (!panel) return;

  const msgs = window._ai.messages.map(m => {
    const cls = m.role === 'user' ? 'user' : (m.error ? 'error' : 'assistant');
    const time = m.time || '';
    return `<div class="ai-msg ${cls}">
      <div class="ai-bubble">${m.content.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
      <div class="ai-time">${time}</div>
    </div>`;
  }).join('');

  const typing = window._ai.loading ?
    `<div class="ai-msg assistant"><div class="ai-bubble"><div class="ai-typing"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div></div></div>` : '';

  const suggestions = window._ai.messages.length === 0 ? `
    <div class="ai-suggestions">
      <div class="ai-suggestion" onclick="aiSend(this.textContent)">How are students progressing overall?</div>
      <div class="ai-suggestion" onclick="aiSend(this.textContent)">Who needs attention this week?</div>
      <div class="ai-suggestion" onclick="aiSend(this.textContent)">Which activities are most students stuck on?</div>
      <div class="ai-suggestion" onclick="aiSend(this.textContent)">Tips for a child at Working Well stage</div>
    </div>` : '';

  const setupNotice = !apiKey ? `
    <div class="ai-setup-notice">
      ⚙️ No API key found. Go to <strong>Admin → AI Assistant Settings</strong> to add your Anthropic API key.
    </div>` : '';

  panel.innerHTML = `
    <div class="ai-panel-header">
      <div class="ai-logo">✨</div>
      <div class="ai-title">
        <h3>Newton AI Assistant</h3>
        <p>Powered by Claude · Ask anything about your students</p>
      </div>
      <div class="ai-header-btns">
        <button class="ai-header-btn" onclick="aiClear()" title="Clear chat">🗑</button>
        <button class="ai-header-btn" onclick="aiToggle()" title="Close">✕</button>
      </div>
    </div>
    <div class="ai-messages" id="ai-messages">
      ${msgs}${typing}
    </div>
    ${suggestions}
    <div class="ai-input-area">
      ${setupNotice}
      <div class="ai-input-row">
        <textarea class="ai-textarea" id="ai-input" placeholder="Ask about students, progress, activities…"
          rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
        <button class="ai-mic-btn ${window._ai.listening?'listening':''}" id="ai-mic"
          onclick="aiToggleMic()" title="${window._ai.listening?'Stop listening':'Voice input'}">
          ${window._ai.listening?'🔴':'🎤'}
        </button>
        <button class="ai-send-btn" onclick="aiSend()" ${window._ai.loading?'disabled':''} title="Send">↑</button>
      </div>

    </div>`;

  // Scroll to bottom
  setTimeout(() => {
    const msgs = document.getElementById('ai-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    const input = document.getElementById('ai-input');
    if (input && !window._ai.loading) input.focus();
  }, 50);
};

// ── Send message ─────────────────────────────────────────────────
window.aiSend = async function(text) {
  const input = document.getElementById('ai-input');
  const msg = (text || (input && input.value) || '').trim();
  if (!msg || window._ai.loading) return;
  if (input) input.value = '';
  if (input) input.style.height = 'auto';

  const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  window._ai.messages.push({ role:'user', content:msg, time:now });
  window._ai.loading = true;
  window._ai.msgCount++;
  window.renderAIPanel();

  try {
    const reply = await window.callClaude(msg);
    window._ai.messages.push({ role:'assistant', content:reply, time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) });
    // Text-to-speech
    if (window._ai.tts && window.speechSynthesis) {
      const utt = new SpeechSynthesisUtterance(reply);
      utt.rate = 1.0; utt.pitch = 1.0;
      window.speechSynthesis.speak(utt);
    }
  } catch(e) {
    window._ai.messages.push({ role:'assistant', content:'Error: ' + e.message, error:true, time:'' });
  }
  window._ai.loading = false;
  window.renderAIPanel();
};

// ── Toggle panel ────────────────────────────────────────────────
window.aiClosePanel = function() {
  var panel = document.getElementById('ai-panel');
  var fab   = document.getElementById('ai-fab');
  if (panel) panel.classList.remove('open');
  if (panel) panel.style.transform = 'translateX(100%)';
  if (fab)   fab.style.display = 'flex';
  if (window._ai) window._ai.open = false;
};

window.aiToggle = function() {
  window._ai.open = !window._ai.open;
  const panel = document.getElementById('ai-panel');
  const fab   = document.getElementById('ai-fab');
  if (panel) panel.classList.toggle('open', window._ai.open);
  if (fab)   fab.style.display = window._ai.open ? 'none' : 'flex';
  if (window._ai.open) {
    window.renderAIPanel();
    // Load progress data in background when panel first opens
    window.loadAIProgressData().then(function() {
      // Refresh panel header to show data loaded
      if (window._ai.messages.length === 0) window.renderAIPanel();
    });
  }
};

// ── Clear chat ──────────────────────────────────────────────────
window.aiClear = function() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  window._ai.messages = [];
  window.renderAIPanel();
};

// ── Voice input ─────────────────────────────────────────────────
window.aiToggleMic = function() {
  if (window._ai.listening) {
    if (window._aiRecognition) window._aiRecognition.stop();
    window._ai.listening = false;
    window.renderAIPanel();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input is not supported in this browser. Try Chrome.'); return; }
  const rec = new SR();
  window._aiRecognition = rec;
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.onstart  = () => { window._ai.listening = true;  window.renderAIPanel(); };
  rec.onend    = () => { window._ai.listening = false; window.renderAIPanel(); };
  rec.onerror  = () => { window._ai.listening = false; window.renderAIPanel(); };
  rec.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    window._ai.listening = false;
    window.renderAIPanel();
    window.aiSend(transcript);
  };
  rec.start();
};

// ── Inject FAB + panel into DOM once page loads ─────────────────
(function injectAI() {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectAI);
    return;
  }
  // Only inject for Admin after login
  function checkAndInject() {
    if (!document.getElementById('ai-fab') && state && state.token && state.teacherName && state.teacherRole === 'Admin') {
      const fab = document.createElement('button');
      fab.id = 'ai-fab'; fab.className = 'ai-fab';
      fab.innerHTML = '✨';
      fab.onclick = window.aiToggle;
      fab.title = 'Newton AI Assistant';
      document.body.appendChild(fab);

      const panel = document.createElement('div');
      panel.id = 'ai-panel'; panel.className = 'ai-panel';
      document.body.appendChild(panel);
    }
  }
  // Poll until Admin is logged in
  const interval = setInterval(() => {
    if (state && state.token && state.teacherName && state.teacherRole === 'Admin') {
      checkAndInject(); clearInterval(interval);
    }
  }, 500);
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// VOICE INPUT — speech-to-text for observation note textareas
// Supports English and Spanish; uses Claude for grammar correction +
// Spanish→English translation. Requires Chrome (Web Speech API).
// ═══════════════════════════════════════════════════════════════════════
(function() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var _rec = null;        // active SpeechRecognition instance
  var _activeTaId = null; // textarea ID currently recording

  var MIC_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>';

  // ── Entry point called by mic button onclick ──────────────────────────
  window.startMic = function(taId) {
    var ta = document.getElementById(taId);
    if (!ta) return;

    // Unsupported browser
    if (!SR) {
      setMicState(taId, 'unsupported', null);
      return;
    }

    // Tap again on active mic = stop
    if (_rec && _activeTaId === taId) {
      _rec.stop();
      return;
    }

    // Stop any other active recording
    if (_rec) {
      _rec.abort();
      if (_activeTaId) setMicState(_activeTaId, 'idle', null);
    }

    var rec = new SR();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US'; // Chrome captures Spanish well at en-US; Claude handles translation
    rec.maxAlternatives = 1;
    _rec = rec;
    _activeTaId = taId;
    setMicState(taId, 'recording', null);

    rec.onresult = function(e) {
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      transcript = transcript.trim();
      _rec = null; _activeTaId = null;
      if (!transcript) {
        setMicState(taId, 'error', 'No speech detected, please try again');
        return;
      }
      setMicState(taId, 'processing', null);
      claudeCorrect(transcript, taId);
    };

    rec.onerror = function(e) {
      _rec = null; _activeTaId = null;
      var msg = e.error === 'not-allowed' || e.error === 'permission-denied'
        ? 'Please allow microphone access to use this feature'
        : e.error === 'no-speech'
        ? 'No speech detected, please try again'
        : e.error === 'audio-capture'
        ? 'Microphone not found — please check your device'
        : 'Microphone error (' + e.error + ') — please try again';
      setMicState(taId, 'error', msg);
    };

    rec.onend = function() {
      if (_rec === rec) { _rec = null; _activeTaId = null; }
      var st = document.getElementById('mic-status-' + taId);
      if (st && st.dataset.micState === 'recording') {
        setMicState(taId, 'error', 'No speech detected, please try again');
      }
    };

    try {
      rec.start();
      setTimeout(function() {
        if (_rec && _activeTaId === taId) { _rec.stop(); }
      }, 30000);
    }
    catch(err) {
      _rec = null; _activeTaId = null;
      setMicState(taId, 'error', 'Could not start microphone — please try again');
    }
  };

  // ── Visual state: recording / processing / done / error / idle ────────
  function setMicState(taId, micState, msg) {
    var st  = document.getElementById('mic-status-' + taId);
    var btn = document.getElementById('mic-btn-' + taId);
    var ta  = document.getElementById(taId);
    if (!st) return;
    st.dataset.micState = micState;

    // Reset button to neutral before applying new state
    if (btn) {
      btn.style.background = 'white';
      btn.style.borderColor = '#E0E0E0';
      btn.style.color = '#666';
      btn.innerHTML = MIC_SVG;
    }
    if (ta) ta.style.borderColor = '';

    if (micState === 'recording') {
      st.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;'
        + 'background:#FCEBEB;color:#A32D2D;padding:3px 9px;border-radius:20px;font-weight:600">'
        + '<span style="width:7px;height:7px;border-radius:50%;background:#E24B4A;flex-shrink:0;'
        + 'animation:micPulse 1s ease-in-out infinite;display:inline-block"></span>'
        + 'Listening… tap mic to stop</span>';
      if (btn) { btn.style.background='#FCEBEB'; btn.style.borderColor='#F09595'; btn.style.color='#A32D2D'; }
      if (ta)  { ta.style.borderColor='#F09595'; }

    } else if (micState === 'processing') {
      st.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;'
        + 'background:#E6F1FB;color:#185FA5;padding:3px 9px;border-radius:20px;font-weight:600">'
        + '<span style="width:11px;height:11px;border:1.5px solid #85B7EB;border-top-color:#185FA5;'
        + 'border-radius:50%;flex-shrink:0;animation:micSpin 0.7s linear infinite;display:inline-block"></span>'
        + 'Correcting grammar…</span>';

    } else if (micState === 'done') {
      st.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;'
        + 'background:#EAF3DE;color:#3B6D11;padding:3px 9px;border-radius:20px;font-weight:600">'
        + '✓ Transcribed and corrected — review and save</span>';
      clearAfter(taId, 4000);

    } else if (micState === 'done_raw') {
      st.dataset.micState = 'done';
      st.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;'
        + 'background:#EAF3DE;color:#3B6D11;padding:3px 9px;border-radius:20px;font-weight:600">'
        + '✓ Transcribed — add Claude API key for grammar correction</span>';
      clearAfter(taId, 5000);

    } else if (micState === 'error') {
      st.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;'
        + 'background:#FAEEDA;color:#854F0B;padding:3px 9px;border-radius:20px">'
        + '⚠ ' + (msg || 'Error — please try again') + '</span>';
      clearAfter(taId, 6000);

    } else if (micState === 'unsupported') {
      st.innerHTML = '<span style="font-size:11px;color:#888;display:inline-block;padding:3px 0">'
        + 'Speech input is not supported on this browser. Please use Chrome.</span>';
      if (btn) btn.style.display = 'none';

    } else { // idle
      st.innerHTML = '<span style="font-size:11px;color:#aaa">Tap mic to speak · English or Spanish supported</span>';
    }
  }

  function clearAfter(taId, ms) {
    setTimeout(function() {
      var s = document.getElementById('mic-status-' + taId);
      if (s && (s.dataset.micState === 'done' || s.dataset.micState === 'error')) {
        s.innerHTML = '<span style="font-size:11px;color:#aaa">Tap mic to speak · English or Spanish supported</span>';
        s.dataset.micState = 'idle';
      }
    }, ms);
  }

  // ── Claude: grammar correction + Spanish→English translation ─────────
  async function claudeCorrect(transcript, taId) {
    var ta = document.getElementById(taId);
    if (!ta) return;
    var apiKey = localStorage.getItem('nm_claude_key') || '';

    // No API key — insert raw transcript
    if (!apiKey) {
      insertText(ta, transcript);
      setMicState(taId, 'done_raw', null);
      return;
    }

    try {
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 400,
          messages: [{
            role: 'user',
            content: 'You are helping a Montessori teacher quickly record classroom observations via voice.\n\n'
              + 'The text below was captured via speech-to-text and may contain transcription errors or be in Spanish.\n\n'
              + 'Instructions:\n'
              + '1. If the text is fully or partly in Spanish, translate it to English.\n'
              + '2. Fix any transcription or grammar errors.\n'
              + '3. Keep the teacher\'s original meaning and tone — natural and concise, not overly formal.\n'
              + '4. Return ONLY the corrected text. No explanation, no quotes, no extra commentary.\n\n'
              + 'Speech input: ' + transcript
          }]
        })
      });

      if (!resp.ok) {
        var errJson = await resp.json().catch(function(){ return {}; });
        throw new Error((errJson.error && errJson.error.message) || 'API error ' + resp.status);
      }

      var data = await resp.json();
      var corrected = ((data.content && data.content[0] && data.content[0].text) || transcript).trim();
      insertText(ta, corrected);
      setMicState(taId, 'done', null);

    } catch(err) {
      // API failed — still insert raw transcript so work isn't lost
      insertText(ta, transcript);
      setMicState(taId, 'error', 'Grammar correction unavailable — raw transcript inserted');
    }
  }

  // Append text to textarea, move cursor to end
  function insertText(ta, text) {
    ta.value = ta.value ? ta.value.trimEnd() + ' ' + text : text;
    ta.dispatchEvent(new Event('input', { bubbles: true }));
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }

})();
</script>
