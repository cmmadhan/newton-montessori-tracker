  bind('tab-materials', () => {
    state.mode = 'materials'; state.screen = 'materials';
    state.matSearch = ''; state.matProgramFilter = 'All';
    state.matSubjectFilter = 'All'; state.matStatusFilter = 'All';
    state.matForm = null;
    if (!state.materialsLoaded) loadMaterials();
    else render();
  });
}

function setupHandlers() {
  const on = (id, ev, fn) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener(ev, fn);
  };

  // Setup screen
  on('setup-btn', 'click', async () => {
    // Use token from input field if visible, otherwise fall back to saved token
    const token = (document.getElementById('token-input')?.value?.trim()) || state.token;
    const teacherName = document.getElementById('teacher-input')?.value?.trim();
    if (!token) { state.error = 'Please enter your Airtable token.'; render(); return; }
    if (!teacherName) { state.error = 'Please enter your name.'; render(); return; }

    // Verify name against Staff table BEFORE allowing access
    state.token = token;
    state.error = '';
    state.screen = 'loading'; render();

    try {
      const staffRecs = await fetchAll(TABLES.staff, [], null);
      const match = staffRecs.find(r => {
        const name = r.fields['full_name'] || r.fields[FIELD.staffName] || '';
        const active = r.fields['is_active'] !== false; // must be active
        return name.toLowerCase() === teacherName.toLowerCase() && active;
      });

      if (!match) {
        // Name not found in Staff table — block access
        state.token = '';
        state.error = `"${teacherName}" was not found in the staff list. Please enter your name exactly as it appears in the school records, or contact your administrator.`;
        state.screen = 'setup';
        render();
        return;
      }

      // Valid staff member — save credentials
      state.teacherName = teacherName;
      state.teacherRecordId = match.id;
      // Seed staffById immediately so name resolution works even if loadData staff fetch fails
      if (!state.staffById) state.staffById = {};
      state.staffById[match.id] = teacherName;
      const role = match.fields['role'] || match.fields[FIELD.staffRole] || 'Teacher';
      state.teacherRole = role;
      // Store classroom IDs for access control
      const classroomLinks = match.fields['classrooms'] || match.fields[FIELD.staffClassrooms] || [];
      state.teacherClassroomIds = classroomLinks;
      localStorage.setItem('nm_classroom_ids', JSON.stringify(classroomLinks));
      localStorage.setItem('nm_token', token);
      localStorage.setItem('nm_teacher_name', teacherName);
      localStorage.setItem('nm_teacher_id', match.id);
      localStorage.setItem('nm_teacher_role', role);

    } catch(e) {
      state.error = `Could not verify staff access: ${e.message}. Check your Airtable token.`;
      state.screen = 'setup';
      render();
      return;
    }

    await loadData();
  });

  // Student search
  on('student-search', 'input', (e) => {
    state.studentFilter = e.target.value;
    render();
  });

  // Student cards
  document.querySelectorAll('[data-student-id]').forEach(el => {
    el.addEventListener('click', async () => {
      const s = state.students.find(s => s.id === el.dataset.studentId);
      if (!s) return;
      // Always go to review-detail (unified Log & Track view)
      await loadReviewData(s);
    });
  });

  // Subject tabs
  document.querySelectorAll('[data-subject]').forEach(el => {
    el.addEventListener('click', () => {
      state.subjectFilter = el.dataset.subject;
      render();
    });
  });

  // Activity rows
  document.querySelectorAll('[data-activity-id]').forEach(el => {
    el.addEventListener('click', () => {
      const a = state.activities.find(a => a.id === el.dataset.activityId);
      if (!a) return;
      // Activity cards no longer used — log-matrix handles this
      render();
    });
  });

  // Status buttons
  document.querySelectorAll('[data-status]').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedStatus = el.dataset.status;
      render();
    });
  });

  // Context chips


  on('download-all-btn',    'click', () => generateReport(false));
  on('download-active-btn', 'click', () => generateReport(true));

  // Notes input
  on('notes-input', 'input', (e) => { state.notes = e.target.value; });

  // Submit
  on('submit-btn', 'click', submitProgress);

  // Back buttons
  on('back-to-students', 'click', () => {
    state.screen = 'select-student'; render();
  });
  on('back-to-activities', 'click', () => {
    state.screen = 'log-matrix'; render();
  });

  // ── Trends handlers ──
  on('trends-student-search', 'input', (e) => { state.trendsStudentFilter = e.target.value; render(); });

  document.querySelectorAll('[data-trends-student-id]').forEach(el => {
    el.addEventListener('click', () => {
      const s = state.students.find(s => s.id === el.dataset.trendsStudentId);
      if (!s) return;
      state.trendsStudent = s;
      state.trendsData = null;
      state.screen = 'trends-picker';
      // Pre-fill sensible defaults
      const now = new Date();
      const yr = now.getFullYear();
      if (!state.period1Start) state.period1Start = `${yr-1}-09-01`;
      if (!state.period1End)   state.period1End   = `${yr-1}-12-31`;
      if (!state.period2Start) state.period2Start = `${yr}-01-01`;
      if (!state.period2End)   state.period2End   = todayET();
      render();
    });
  });

  on('p1-start','change',e=>{state.period1Start=e.target.value;});
  on('p1-end',  'change',e=>{state.period1End  =e.target.value;});
  on('p2-start','change',e=>{state.period2Start=e.target.value;});
  on('p2-end',  'change',e=>{state.period2End  =e.target.value;});

  on('run-trends-btn', 'click', () => {
    if (!state.period1End || !state.period2End) {
      state.error = 'Please set at least the end date for both periods.'; render(); return;
    }
    state.error = '';
    computeTrends();
  });

  on('back-to-trends-select', 'click', () => { state.screen='trends-select'; render(); });
  on('back-to-trends-picker', 'click', () => { state.screen='trends-picker'; render(); });

  document.querySelectorAll('[data-trends-subject]').forEach(el => {
    el.addEventListener('click', () => { state.trendsSubjectFilter=el.dataset.trendsSubject; render(); });
  });
  document.querySelectorAll('[data-trends-change]').forEach(el => {
    el.addEventListener('click', () => { state.trendsChangeFilter=el.dataset.trendsChange; render(); });
  });

  on('trends-print-btn', 'click', () => generateTrendsReport());

  // Review student cards (in dropdown and legacy select screen)
  document.querySelectorAll('[data-review-student-id]').forEach(el => {
    el.addEventListener('click', () => {
      const s = state.students.find(s => s.id === el.dataset.reviewStudentId);
      if (s) loadReviewData(s);
    });
  });

  // Review subject tabs
  document.querySelectorAll('[data-review-subject]').forEach(el => {
    el.addEventListener('click', () => {
      state.reviewSubjectFilter = el.dataset.reviewSubject;
      render();
    });
  });

  // Status cells now use inline onclick → lmQuickStatus (no handler needed)

  // Log Matrix interactions handled by window.lm* functions (see bottom of file)


  // Observation buttons now use window.saveObs / window.closeObs (inline onclick)

  // Log-for-this-student merged into Progress tab

  // Success actions
  on('log-another-same', 'click', () => {
    state.screen = 'log-matrix';
    state.expandedActivityId = null;
    render();
  });
  on('log-different', 'click', () => {
    state.screen = 'select-student';
    state.selectedStudent = null;
    state.selectedActivity = null;
    state.selectedStatus = '';
    state.notes = '';
    render();
  });

  // ── Activity Library: search (focus-safe) + accordion toggles ───────
  on('act-lib-search', 'input', (e) => {
    const pos = e.target.selectionStart;
    state.activityLibraryFilter = e.target.value;
    state.activityEditId = null;
    render();
    const inp = document.getElementById('act-lib-search');
    if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
  });

  // Age filter inputs — focus-safe handlers for both review-detail and log-matrix
  ['age-min-rv','age-max-rv','age-min-lm','age-max-lm'].forEach(id => {
    on(id, 'input', (e) => {
      const pos = e.target.selectionStart;
      const val = e.target.value;
      if (id === 'age-min-rv' || id === 'age-min-lm') state.ageFilterMin = val;
      else state.ageFilterMax = val;
      render();
      const inp = document.getElementById(id);
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    });
  });
  document.querySelectorAll('[data-acclibkey]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.acclibkey;
      if (!state.activityLibraryExpanded) state.activityLibraryExpanded = {};
      state.activityLibraryExpanded[key] = !state.activityLibraryExpanded[key];
      render();
    });
  });

  // ── Daily Log controls ────────────────────────────────────────────────
  on('log-range-toggle', 'click', () => {
    state.logRangeMode = !state.logRangeMode;
    if (!state.logRangeMode) state.logDateEnd = state.logDate;
    render();
  });
  on('log-reload', 'click', () => {
    const s = document.getElementById('log-date-start');
    const e = document.getElementById('log-date-end');
    if (s) state.logDate    = s.value;
    if (e) state.logDateEnd = e.value;
    if (!state.logDateEnd || state.logDateEnd < state.logDate) state.logDateEnd = state.logDate;
    state.logStudentId = null;
    loadLogData(state.logDate, state.logRangeMode ? state.logDateEnd : state.logDate);
  });
  on('log-back', 'click', () => {
    state.logStudentId = null;
    render();
  });

  // ── Book search — avoid re-render on every keystroke (focus loss fix) ──
  const bookSearchEl = document.getElementById('book-search');
  if (bookSearchEl) {
    bookSearchEl.addEventListener('input', function() {
      state.bookSearch = this.value;
      // Re-render the table body and KPIs without destroying the input
      const books = state.books || [];
      const q = state.bookSearch.toLowerCase();
      const filtered = books.filter(b => {
        if (state.bookGenreFilter !== 'All' && b.genre !== state.bookGenreFilter) return false;
        if (state.bookCategoryFilter !== 'All' && b.category !== state.bookCategoryFilter) return false;
        if (state.bookAgeFilter !== 'All' && b.ageGroup !== state.bookAgeFilter) return false;
        if (!q) return true;
        return (b.title||'').toLowerCase().includes(q)
          || (b.author||'').toLowerCase().includes(q)
          || (b.isbn||'').toLowerCase().includes(q)
          || (b.tags||'').toLowerCase().includes(q);
      });
      // Full render is needed to update KPIs + row count; restore focus after
      const sel = this.selectionStart;
      render();
      const el2 = document.getElementById('book-search');
      if (el2) { el2.focus(); el2.setSelectionRange(sel, sel); }
    });
  }

  // ── Reading Log — book search handled via inline onfocus/oninput/onblur ──
  // (No addEventListener here — inline handlers survive DOM re-renders without
  //  re-attachment, and avoid the focus→render→focus infinite-loop.)
  positionRlDropdown(); // Reposition/update body-mounted portal after each render

  // ── Book Library save handler ──────────────────────────────────────────
  on('bf-save-btn', 'click', async () => {
    if (state.bookFormSaving) return;
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const formData = {
      title:       get('bf-title'),
      author:      get('bf-author'),
      illustrator: get('bf-illustrator'),
      isbn:        get('bf-isbn'),
      series:      get('bf-series'),
      genre:       get('bf-genre'),
      category:    get('bf-category'),
      ageGroup:    get('bf-ageGroup'),
      format:      get('bf-format'),
      publisher:   get('bf-publisher'),
      qtyOwned:    get('bf-qtyOwned') || '1',
      condition:   get('bf-condition'),
      pages:       get('bf-pages'),
      location:    get('bf-location'),
      montessori:  get('bf-montessori'),
      tags:        get('bf-tags'),
      notes:       document.getElementById('bf-notes')?.value?.trim() || '',
    };
    if (!formData.title) { state.bookFormError = 'Title is required.'; render(); return; }
    const recordId = state.bookForm?.id || null;
    await saveBook(formData, recordId);
  });

  // ── Materials Catalog handlers ─────────────────────────────────────────
  wireMaterialsForm();
  wireMatSearch();
  wireMatPicker();
}

// ── Trends: Compute comparison ────────────────────────────────────────
const STATUS_ORDER = { 'Presented':1, 'In Progress':2, 'Working Well':3, 'Mastered':4 };

function snapshotStatus(records, activityId, beforeDate) {
  // Find most recent record for this activity on or before beforeDate
  const matching = records
    .filter(r => r.activityId === activityId && r.date <= beforeDate)
    .sort((a,b) => b.date.localeCompare(a.date));
  return matching.length ? matching[0].status : null;
}

async function computeTrends() {
  if (!state.trendsStudent || !state.period1End || !state.period2End) return;
  state.trendsLoading = true; render();
  try {
    // Load all progress records for this student
    const prRecs = await fetchAll(TABLES.progress, [], null);
    const myRecords = prRecs
      .filter(r => (r.fields['student']||r.fields[FIELD.prStudent]||[]).includes(state.trendsStudent.id))
      .map(r => {
        const actIds = r.fields['activity']||r.fields[FIELD.prActivity]||[];
        return {
          activityId: actIds[0]||'',
          status: r.fields['status']||r.fields[FIELD.prStatus]||'',
          date: r.fields['record_date']||r.fields[FIELD.prDate]||'',
          notes: r.fields['observation_notes']||r.fields[FIELD.prNotes]||'',
        };
      })
      .filter(r => r.activityId && r.status && r.date);

    // Get all unique activities this student has any record for
    const allActivityIds = [...new Set(myRecords.map(r => r.activityId))];

    // Build comparison rows
    const rows = allActivityIds.map(actId => {
      const act = state.activities.find(a => a.id === actId);
      if (!act) return null;

      const p1End = state.period1End || '2000-01-01';
      const p2End = state.period2End;

      const s1 = snapshotStatus(myRecords, actId, p1End);
      const s2 = snapshotStatus(myRecords, actId, p2End);

      const o1 = STATUS_ORDER[s1] || 0;
      const o2 = STATUS_ORDER[s2] || 0;
      const diff = o2 - o1;

      let changeType, changeLabel, arrow;
      if (!s1 && s2)          { changeType='new';        changeLabel='New';        arrow='🆕'; }
      else if (!s1 && !s2)    return null; // no data in either period
      else if (!s2)           { changeType='maintained'; changeLabel='No update';  arrow='—'; }
      else if (diff >= 2)     { changeType='big-leap';   changeLabel='Big Leap ↑↑'; arrow='⬆⬆'; }
      else if (diff === 1)    { changeType='advanced';   changeLabel='Advanced ↑'; arrow='⬆'; }
      else if (diff === 0)    { changeType='maintained'; changeLabel='Maintained'; arrow='→'; }
      else if (diff === -1)   { changeType='regressed';  changeLabel='Regressed ↓'; arrow='⬇'; }
      else                    { changeType='regressed';  changeLabel='Regressed ↓↓'; arrow='⬇⬇'; }

      return { actId, name:act.name, subject:act.subject, category:act.category,
               seq:act.seq, s1, s2, diff, changeType, changeLabel, arrow };
    }).filter(Boolean).sort((a,b) => a.seq - b.seq);

    state.trendsData = rows;
  } catch(e) { state.error = e.message; }
  state.trendsLoading = false;
  state.screen = 'trends-map';
  render();
}

// ── Today's date in US Eastern Time (YYYY-MM-DD) ────────────────────
function todayET() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}

// ── Convert UTC timestamp to Eastern Time ───────────────────────────
function toET(isoStr) {
  if (!isoStr) return '—';
  try {
    return new Date(isoStr).toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone: 'America/New_York'
    });
  } catch(e) { return isoStr.slice(11,16)||'—'; }
}

// ── Scroll preservation (prevents page jump on status updates) ────────
function saveScroll() {
  var el = document.querySelector('.sheet-outer');
  return el ? el.scrollTop : 0;
}
function restoreScroll(pos) {
  var el = document.querySelector('.sheet-outer');
  if (el) el.scrollTop = pos;
}

// ── Fix sticky header: pin thead just below .sheet-sticky-top ─────────
function fixStickyHeader() {
  // Hide page scrollbar — sheet-outer handles all scrolling
  document.body.style.overflow = 'hidden';

  function applyMeasure() {
    const appHeader = document.querySelector('.app-header');
    const headerH = appHeader ? appHeader.offsetHeight : 96;
    document.querySelectorAll('.sheet-outer').forEach(function(el) {
      el.style.height = 'calc(100vh - ' + headerH + 'px)';
    });
    const stickyTop = document.querySelector('.sheet-sticky-top');
    if (!stickyTop) return;
    const h = stickyTop.offsetHeight;
    // Desc row sticks just below sheet-sticky-top
    document.querySelectorAll('.sth-desc-row td').forEach(function(td) {
      td.style.top = h + 'px';
    });
    document.documentElement.style.setProperty('--sheet-thead-top', h + 'px');
    // Colored band sticks just below the desc row
    var descRow = document.querySelector('.sheet-table > thead > tr.sth-desc-row');
    var descH = descRow ? descRow.offsetHeight : 24;
    var coloredTop = h + descH;
    document.querySelectorAll('.sheet-table > thead > tr:not(.sth-desc-row) th').forEach(function(th) {
      th.style.top = coloredTop + 'px';
    });
  }

  // Measure after paint, then again after a short delay for async content
  requestAnimationFrame(function() {
    applyMeasure();
    setTimeout(applyMeasure, 150);
    setTimeout(applyMeasure, 400);
  });

  // Re-measure automatically whenever the sticky area changes height
  const stickyEl = document.querySelector('.sheet-sticky-top');
  if (stickyEl && window.ResizeObserver) {
    if (window._stickyResizeObserver) window._stickyResizeObserver.disconnect();
    window._stickyResizeObserver = new ResizeObserver(function() { applyMeasure(); });
    window._stickyResizeObserver.observe(stickyEl);
  }
}

function clearStickyHeader() {
  // Restore page scrollbar for non-spreadsheet screens
  document.body.style.overflow = '';
  document.querySelectorAll('.sheet-outer').forEach(function(el) {
    el.style.height = '';
  });
}

// ── Observation Save & Close (window-level for inline onclick) ──────────
window.closeObs = function() {
  state.expandedActivityId = null;
  render();
};

window.saveObs = async function(actId) {
  var statusEl = document.getElementById('obs-status-' + actId);
  var dateEl   = document.getElementById('obs-date-'   + actId);
  var notesEl  = document.getElementById('obs-notes-'  + actId);
  var saveBtn  = document.getElementById('obs-save-'   + actId);

  var notes = notesEl ? notesEl.value.trim() : '';
  var date  = dateEl  ? dateEl.value : todayET();
  var selStatus = statusEl ? statusEl.value : '';

  // Read current status from hidden input embedded at render time (most reliable)
  var hiddenEl = document.getElementById('obs-current-' + actId);
  var currentStatus = (hiddenEl && hiddenEl.value) ? hiddenEl.value : '';
  // Additional fallbacks
  if (!currentStatus && state.reviewStatuses) {
    var sr = state.reviewStatuses.find(function(r){ return r.activityId === actId; });
    if (sr) currentStatus = sr.status;
  }
  if (!currentStatus && state.statusMap) currentStatus = state.statusMap[actId] || '';

  var status = selStatus || currentStatus;

  if (!notes) {
    alert('Please enter an observation note.');
    return;
  }
  // No status guard — observations are independent of status

  if (saveBtn) { saveBtn.textContent = 'Saving…'; saveBtn.disabled = true; }

  try {
    var act = state.activities.find(function(a){ return a.id === actId; });
    if (!act) throw new Error('Activity not found');

    var student = state.reviewStudent || state.selectedStudent;
    if (!student) throw new Error('No student selected');

    var fields = {};
    fields[FIELD.prStudent]  = [student.id];
    fields[FIELD.prActivity] = [actId];
    if (status) fields[FIELD.prStatus] = status; // optional — only set if status exists
    fields[FIELD.prDate]     = date;
    if (notes) fields[FIELD.prNotes] = notes;
    if (state.teacherRecordId) fields[FIELD.prRecordedBy] = [state.teacherRecordId];

    await airtable(TABLES.progress, { method: 'POST', body: JSON.stringify({ records: [{ fields: fields }] }) });

    // Update SAS only if a status is present (observation-only saves skip this)
    if (status) {
      var compositeKey = student.brightwheel + '-' + act.stableId;
      var existing = await fetchAll(TABLES.status, [], null);
      var match = existing.find(function(r) {
        return (r.fields['composite_key'] || r.fields[FIELD.sasCompositeKey] || '') === compositeKey;
      });
      if (match) {
        var pf = {}; pf[FIELD.sasCurrent] = status; pf[FIELD.sasUpdated] = date;
        await airtable(TABLES.status + '/' + match.id, { method: 'PATCH', body: JSON.stringify({ fields: pf }) });
      } else {
        var nf = {};
        nf[FIELD.sasStudent]      = [student.id];
        nf[FIELD.sasActivity]     = [actId];
        nf[FIELD.sasCurrent]      = status;
        nf[FIELD.sasUpdated]      = date;
        nf[FIELD.sasCompositeKey] = compositeKey;
        await airtable(TABLES.status, { method: 'POST', body: JSON.stringify({ records: [{ fields: nf }] }) });
      }
      state.statusMap[actId] = status;
    }
    // ── In-place update (no loading screen flash) ───────────────────────
    // Reset the form immediately
    if (saveBtn) { saveBtn.textContent = 'Saved ✓'; saveBtn.disabled = false; }
    var notesElRef = document.getElementById('obs-notes-' + actId);
    if (notesElRef) notesElRef.value = '';

    // Prepend the new entry optimistically so history shows right away
    var newEntry = {
      id: '', status: status || '',
      date: date,
      time: toET(new Date().toISOString()),
      fullTime: new Date().toISOString(),
      notes: notes,
      teacher: state.teacherName || 'Staff'
    };
    state.expandedHistory = [newEntry].concat(state.expandedHistory || []);

    // Keep row expanded and re-render in place (no screen transition)
    state.expandedActivityId = actId;
    var _sp = saveScroll();
    render();
    restoreScroll(_sp);

    // Silently reload the full history in background for accuracy
    try {
      var prRecs = await fetchAll(TABLES.progress, [], null);
      var myF = function(r,n,id){ return r.fields[n]!==undefined?r.fields[n]:(r.fields[id]||''); };
      state.expandedHistory = prRecs
        .filter(function(r){ var s=r.fields['student']||r.fields[FIELD.prStudent]||[]; return s.includes(student.id); })
        .filter(function(r){ var a=r.fields['activity']||r.fields[FIELD.prActivity]||[]; return a.includes(actId); })
        .map(function(r){
          var recBy = r.fields['recorded_by']||r.fields[FIELD.prRecordedBy]||[];
          var tId = Array.isArray(recBy) ? (typeof recBy[0]==='object' ? recBy[0].id : recBy[0]) : '';
          var tName = (tId && state.staffById && state.staffById[tId]) || '';
          return {
            id: r.id, status: myF(r,'status',FIELD.prStatus),
            date: myF(r,'record_date',FIELD.prDate),
            time: toET(r.fields['created_time']||r.createdTime||''),
            fullTime: r.fields['created_time']||r.createdTime||'',
            notes: myF(r,'observation_notes',FIELD.prNotes),
            teacher: tName,
          };
        })
        .sort(function(a,b){ return b.date.localeCompare(a.date)||b.fullTime.localeCompare(a.fullTime); });
      var _sp2 = saveScroll();
      render();
      restoreScroll(_sp2);
    } catch(e2) {}

  } catch(err) {
    if (saveBtn) { saveBtn.textContent = 'Save Observation'; saveBtn.disabled = false; }
    alert('Error saving: ' + err.message);
  }
};

// ── Master click delegation on #app (handles all dynamic buttons) ────────
(function setupAppDelegation() {
  function attach() {
    var appEl = document.getElementById('app');
    if (!appEl || appEl._delegationAttached) return;
    appEl._delegationAttached = true;

    appEl.addEventListener('click', async function(e) {

      // ── lm-status-btn (Log row status selection) ──
      var statusBtn = e.target.closest('.lm-status-btn');
      if (statusBtn) {
        e.stopPropagation();
        var aid = statusBtn.dataset.actid;
        appEl.querySelectorAll('.lm-status-btn[data-actid="'+aid+'"]').forEach(function(b) {
          b.dataset.selected='false'; b.style.borderColor='#E0E0E0'; b.style.background='white';
        });
        statusBtn.dataset.selected='true'; statusBtn.style.borderColor='#F9C522'; statusBtn.style.background='#FFFDE7';
        return;
      }

      // ── lm-save-btn (Log row Save) ──
      var saveBtn = e.target.closest('.lm-save-btn');
      if (saveBtn && !saveBtn.disabled) {
        e.stopPropagation();
        var actId = saveBtn.dataset.actid;
        // Status comes from statusMap (set by tapping checkmarks in the grid)
        var student = state.reviewStudent || state.selectedStudent;
        var status = (state.statusMap && state.statusMap[actId]) || '';
        if (!status) { alert('Please tap a status checkmark (Presented / In Progress / Working Well / Mastered) for this activity first, then add your observation.'); return; }
        var notes = (document.getElementById('lognotes-'+actId)||{}).value||'';
        var date  = state.assessmentDate || todayET();
        saveBtn.textContent='Saving…'; saveBtn.disabled=true;
        try {
          var act = state.activities.find(function(a){return a.id===actId;});
          if (!act) throw new Error('Activity not found');
          var student = state.reviewStudent || state.selectedStudent;
          var fields = {};
          fields[FIELD.prStudent]=[student.id]; fields[FIELD.prActivity]=[actId];
          fields[FIELD.prStatus]=status; fields[FIELD.prDate]=date;
          if (notes.trim()) fields[FIELD.prNotes]=notes.trim();
          if (state.teacherRecordId) fields[FIELD.prRecordedBy]=[state.teacherRecordId];
          await airtable(TABLES.progress,{method:'POST',body:JSON.stringify({records:[{fields:fields}]})});
          var compositeKey=student.brightwheel+'-'+act.stableId;
          var existing=await fetchAll(TABLES.status,[],null);
          var match=existing.find(function(r){return (r.fields['composite_key']||r.fields[FIELD.sasCompositeKey]||'')===compositeKey;});
          if(match){var pf={};pf[FIELD.sasCurrent]=status;pf[FIELD.sasUpdated]=date;
            await airtable(TABLES.status+'/'+match.id,{method:'PATCH',body:JSON.stringify({fields:pf})});}
          else{var nf={};nf[FIELD.sasStudent]=[student.id];nf[FIELD.sasActivity]=[actId];
            nf[FIELD.sasCurrent]=status;nf[FIELD.sasUpdated]=date;nf[FIELD.sasCompositeKey]=compositeKey;
            await airtable(TABLES.status,{method:'POST',body:JSON.stringify({records:[{fields:nf}]})});}
          state.statusMap[actId]=status; state.expandedActivityId=null; var _sp=saveScroll(); render(); restoreScroll(_sp);
        } catch(err){saveBtn.textContent='Save ✓';saveBtn.disabled=false;alert('Error: '+err.message);}
        return;
      }

      // ── lm-cancel-btn (Log row Cancel) ──
      var cancelBtn = e.target.closest('.lm-cancel-btn');
      if (cancelBtn) { e.stopPropagation(); state.expandedActivityId=null; render(); return; }

      // ── obs-save-btn (Observation Save) ──
      var obsSave = e.target.closest('[data-obs-save]');
      if (obsSave) {
        e.stopPropagation();
        window.saveObs(obsSave.dataset.obsSave);
        return;
      }

      // ── obs-close-btn (Observation Close) ──
      var obsClose = e.target.closest('[data-obs-close]');
      if (obsClose) { e.stopPropagation(); window.closeObs(); return; }

    });
  }

  // Attach now, and wrap render to auto-preserve scroll + re-attach
  attach();
  var _origRender = window.render;
  if (_origRender && !_origRender._wrapped) {
    window.render = function() {
      var sheetEl = document.querySelector('.sheet-outer');
      var scrollPos = sheetEl ? sheetEl.scrollTop : 0;
      _origRender.apply(this, arguments);
      attach();
      // Restore scroll after DOM rebuild
      if (scrollPos > 0) {
        var newSheetEl = document.querySelector('.sheet-outer');
        if (newSheetEl) newSheetEl.scrollTop = scrollPos;
      }
    };
    window.render._wrapped = true;
  }
})();

// ── Classroom Insights ─────────────────────────────────────────────────
function renderClassroomInsights() {
  if (!state.globalSas) {
    loadAllSasData().then(() => render());
    return `<div class="loading"><div class="spinner">⟳</div><p style="margin-top:16px">Loading classroom data…</p></div>`;
  }

  const goToStudent = (id) =>
    `state.mode='review';loadReviewData(state.students.find(s=>s.id==='${id}'))`;

  // First not-started activity in sequence for a student
  function nextActivity(student) {
    const sas = state.globalSas[student.id] || {};
    return getActivitiesForProgram(student)
      .filter(a => !sas[a.id])
      .sort((a,b) => a.seq - b.seq)[0] || null;
  }

  // Status label + colors for a student stat object
  function studentStatus(st) {
    if (st.pct < 15) return { label:'Needs attention', bg:'#FFEBEE', tc:'#C62828' };
    if (st.pct < 30) return { label:'Needs push',      bg:'#FFF8E1', tc:'#F57F17' };
    if (st.active > 3 && st.mastered === 0) return { label:'Stalled', bg:'#FFF8E1', tc:'#F57F17' };
    return { label:'On track', bg:'#E8F5E9', tc:'#2E7D32' };
  }

  function subTileColors(pct) {
    if (pct >= 50) return { bg:'#E8F5E9', tc:'#2E7D32' };
    if (pct >= 30) return { bg:'#FFF8E1', tc:'#F57F17' };
    return { bg:'#FFEBEE', tc:'#C62828' };
  }

  function renderProgram(progLabel, ageRange, acts, students) {
    if (!students.length) return '';

    const stats = students.map(s => computeStudentStats(s));
    stats.sort((a,b) => a.pct - b.pct);
    const avg    = Math.round(stats.reduce((s,v) => s+v.pct, 0) / stats.length);
    const avgCol = avg >= 50 ? '#2E7D32' : avg >= 30 ? '#F57F17' : '#C62828';

    // Aggregate subject breakdown across all students in the program
    const progStats = computeProgramStats(students, acts);
    const topSubs = Object.entries(progStats)
      .filter(([,v]) => v.total > 0)
      .map(([sub, v]) => ({ sub, pct: Math.round(v.mastered * 100 / v.total) }))
      .sort((a,b) => progStats[b.sub].total - progStats[a.sub].total) // most-activity subjects first
      .slice(0, 4);

    const flagged = stats.filter(st => studentStatus(st).label !== 'On track');

    return `<div style="background:white;border:1.5px solid #E0E0E0;border-radius:14px;padding:18px;margin-bottom:16px">

      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:3px">
            <span style="font-size:16px;font-weight:700;color:#1A1A1A">${progLabel}</span>
            <span style="background:#E3F2FD;color:#1565C0;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px">${students.length} student${students.length!==1?'s':''}</span>
          </div>
          <div style="font-size:12px;color:#888">${ageRange}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:26px;font-weight:700;color:${avgCol}">${avg}%</div>
          <div style="font-size:11px;color:#aaa">avg mastery</div>
        </div>
      </div>

      <div style="background:#F5F5F5;border-radius:6px;height:6px;overflow:hidden;margin-bottom:14px">
        <div style="height:100%;width:${avg}%;background:${avgCol};border-radius:6px"></div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px">
        ${topSubs.map(({sub, pct}) => {
          const {bg,tc} = subTileColors(pct);
          const short = sub.length > 10 ? sub.slice(0,9)+'…' : sub;
          return `<div style="text-align:center;padding:8px 4px;background:${bg};border-radius:8px">
            <div style="font-size:16px;font-weight:700;color:${tc}">${pct}%</div>
            <div style="font-size:10px;color:${tc};margin-top:2px">${short}</div>
          </div>`;
        }).join('')}
      </div>

      ${flagged.length > 0 ? `
      <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px">Action required</div>
      ${flagged.map(st => {
        const {bg,tc} = studentStatus(st);
        const next = nextActivity(st.student);
        const verb = st.pct < 15 ? 'Introduce' : 'Review';
        const suggestion = next ? verb+': '+cleanName(next.name) : 'Check curriculum';
        const ini = (st.student.name||'?').split(' ').map(n=>n[0]||'').slice(0,2).join('');
        return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#FAFAFA;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="${goToStudent(st.student.id)}">
          <div style="width:30px;height:30px;border-radius:50%;background:${bg};color:${tc};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${ini}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:#1A1A1A">${st.student.name}</div>
            <div style="font-size:11px;color:#aaa">${st.pct}% mastery · ${st.active} in progress</div>
          </div>
          <span style="font-size:12px;color:#1565C0;border:1px solid #BBDEFB;border-radius:6px;padding:3px 9px;white-space:nowrap;flex-shrink:0">${suggestion}</span>
        </div>`;
      }).join('')}
      ` : `<div style="padding:9px 12px;background:#E8F5E9;border-radius:8px;font-size:13px;color:#2E7D32;font-weight:600;margin-bottom:12px">✓ All ${progLabel} students are tracking well</div>`}

      <div style="border-top:1px solid #F5F5F5;padding-top:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px">All students</div>
        ${stats.map(st => {
          const {bg,tc,label:sLabel} = studentStatus(st);
          const pCol = st.pct >= 50 ? '#2E7D32' : st.pct >= 30 ? '#F57F17' : '#C62828';
          const ini = (st.student.name||'?').split(' ').map(n=>n[0]||'').slice(0,2).join('');
          return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid #F5F5F5;cursor:pointer" onclick="${goToStudent(st.student.id)}">
            <div style="width:28px;height:28px;border-radius:50%;background:#EEF2FF;color:#3949AB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${ini}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500;color:#1A1A1A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st.student.name}</div>
              <div style="font-size:11px;color:#bbb">${st.mastered} mastered · ${st.active} in progress</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <div style="width:64px;background:#F5F5F5;border-radius:3px;height:4px;overflow:hidden">
                <div style="height:100%;width:${st.pct}%;background:${pCol};border-radius:3px"></div>
              </div>
              <span style="font-size:12px;color:#666;width:30px;text-align:right">${st.pct}%</span>
            </div>
            <span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:${bg};color:${tc};white-space:nowrap">${sLabel}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Split students by program
  const IT_BANDS = ['Toddler (18m-3y)','Nido (0-18m)'];
  const EC_BANDS = ['Early (2.5-3.5)','Core (3.5-4.5)','Advanced (4.5-6)'];
  const itStudents = state.students.filter(s => { const p = typeof s.program==='string'?s.program:''; return p.includes('Infant')||p.includes('Toddler'); });
  const ecStudents = state.students.filter(s => { const p = typeof s.program==='string'?s.program:''; return p.includes('Early Childhood'); });
  const otherStudents = state.students.filter(s => !itStudents.includes(s) && !ecStudents.includes(s));
  const itActs = state.activities.filter(a => a.ageBand==null || IT_BANDS.includes(a.ageBand));
  const ecActs = state.activities.filter(a => EC_BANDS.includes(a.ageBand));

  return `<div class="main p2-screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div class="p2-title">Classroom Insights</div>
        <div class="p2-sub">${state.students.length} enrolled · ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>
      <button onclick="state.globalSas=null;render()" style="padding:6px 14px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:8px;background:white;cursor:pointer;color:#555">↻ Refresh</button>
    </div>
    ${renderProgram('Infant &amp; Toddler', 'Ages 0 – 3 · Nido + Toddler bands', itActs, itStudents)}
    ${renderProgram('Early Childhood', 'Ages 2.5 – 6 · Early, Core &amp; Advanced bands', ecActs, ecStudents)}
    ${otherStudents.length > 0 ? renderProgram('Other / Unassigned', 'Program not set', [...itActs,...ecActs], otherStudents) : ''}
  </div>`;
}

// ── School Overview ────────────────────────────────────────────────────
function renderSchoolOverview() {
  if (!state.globalSas) {
    loadAllSasData().then(() => render());
    return `<div class="loading"><div class="spinner">⟳</div><p style="margin-top:16px">Loading school data…</p></div>`;
  }
  const IT_BANDS = ['Toddler (18m-3y)','Nido (0-18m)'];
  const EC_BANDS = ['Early (2.5-3.5)','Core (3.5-4.5)','Advanced (4.5-6)'];

  const itStudents = state.students.filter(s => { const p = typeof s.program==='string'?s.program:''; return p.includes('Infant')||p.includes('Toddler'); });
  const ecStudents = state.students.filter(s => { const p = typeof s.program==='string'?s.program:''; return p.includes('Early Childhood'); });
  const itActs     = state.activities.filter(a => a.ageBand==null||IT_BANDS.includes(a.ageBand));
  const ecActs     = state.activities.filter(a => EC_BANDS.includes(a.ageBand));
  const itStats    = computeProgramStats(itStudents, itActs);
  const ecStats    = computeProgramStats(ecStudents, ecActs);

  function programCard(label, emoji, students, acts, statsObj, key) {
    const totalActs = acts.length;
    const subList   = Object.entries(statsObj).sort((a,b) => b[1].total - a[1].total);
    const overallMastered = subList.reduce((s,[,v])=>s+v.mastered,0);
    const overallTotal    = subList.reduce((s,[,v])=>s+v.total,0);
    const pct = overallTotal > 0 ? Math.round(overallMastered*100/overallTotal) : 0;
    const col = pct >= 50 ? '#2E7D32' : pct >= 25 ? '#F57F17' : '#C62828';

    // Sort subjects: strongest first
    const sorted = subList.map(([sub, c]) => ({
      sub, pct: c.total>0 ? Math.round(c.mastered*100/c.total) : 0, total:c.total
    })).sort((a,b) => b.pct - a.pct);
    const strongest = sorted[0];
    const weakest   = sorted[sorted.length-1];
    const expanded  = state.overviewExpanded === key;

    // Classroom drill-down
    const roomIds   = [...new Set(students.map(s=>s.homeroom).filter(Boolean))];
    const rooms = roomIds.map(rid => {
      const rName   = state.classroomNames[rid] || rid.slice(0,6)+'…';
      const rStu    = students.filter(s=>s.homeroom===rid);
      const rStats  = rStu.map(s=>computeStudentStats(s));
      const rAvg    = rStats.length>0 ? Math.round(rStats.reduce((s,v)=>s+v.pct,0)/rStats.length) : 0;
      return {rName, rStu, rAvg};
    });

    return `<div class="overview-card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="font-size:28px">${emoji}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:#1A1A1A">${label}</div>
          <div style="font-size:12px;color:#888">${students.length} students · ${totalActs} activities</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:700;color:${col}">${pct}%</div>
          <div style="font-size:10px;color:#888">avg mastery</div>
        </div>
      </div>
      <div class="prog-outer" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>

      <div class="heat-row">
        ${sorted.map(({sub, pct:sp}) => {
          const bg = sp>=60?'#E8F5E9':sp>=35?'#FFF9E6':sp>=15?'#FFF3E0':'#FFF3F3';
          const tc = sp>=60?'#2E7D32':sp>=35?'#F57F17':sp>=15?'#E65100':'#C62828';
          return `<div class="heat-cell" style="background:${bg}">
            <div style="font-size:10px;color:${tc};font-weight:700;margin-bottom:4px">${sub}</div>
            <div style="font-size:18px;font-weight:700;color:${tc}">${sp}%</div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:20px;margin-top:14px;flex-wrap:wrap">
        ${strongest ? `<div style="font-size:12px"><span style="color:#2E7D32;font-weight:700">✓ Strength: </span>${strongest.sub} (${strongest.pct}%)</div>` : ''}
        ${weakest && weakest.pct < 40 ? `<div style="font-size:12px"><span style="color:#C62828;font-weight:700">⚑ Focus: </span>${weakest.sub} (${weakest.pct}%)</div>` : ''}
      </div>

      ${rooms.length > 0 ? `
      <button onclick="state.overviewExpanded=state.overviewExpanded==='${key}'?null:'${key}';render()"
        style="margin-top:14px;padding:6px 14px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:8px;background:white;cursor:pointer;color:#555">
        ${expanded ? '▲ Hide' : '▼ Classroom breakdown'}
      </button>
      ${expanded ? `<div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
        ${rooms.map(({rName,rStu,rAvg}) => {
          const rc = rAvg>=50?'#2E7D32':rAvg>=25?'#F57F17':'#C62828';
          return `<div style="background:#F9F9F9;border-radius:10px;padding:12px">
            <div style="font-size:13px;font-weight:700;color:#1A1A1A">${rName}</div>
            <div style="font-size:11px;color:#888;margin-bottom:6px">${rStu.length} students</div>
            <div class="prog-outer"><div class="prog-fill" style="width:${rAvg}%;background:${rc}"></div></div>
            <div style="font-size:12px;font-weight:700;color:${rc};margin-top:4px">${rAvg}% avg mastery</div>
          </div>`;
        }).join('')}
      </div>` : ''}` : ''}
    </div>`;
  }

  // School-wide insights (rules-based — AI enhancement available)
  const allSubs = {};
  [...itActs,...ecActs].forEach(a => {
    const sub=a.subject||'Other'; if(!allSubs[sub]) allSubs[sub]={t:0,m:0};
    allSubs[sub].t++;
  });
  state.students.forEach(s => {
    const sas = state.globalSas[s.id]||{};
    [...itActs,...ecActs].forEach(a => {
      const sub=a.subject||'Other'; if(!allSubs[sub]) allSubs[sub]={t:0,m:0};
      if(sas[a.id]==='Mastered') allSubs[sub].m++;
    });
  });
  const subRanked = Object.entries(allSubs).map(([s,v]) => ({s, pct:v.t>0?Math.round(v.m*100/v.t):0})).sort((a,b)=>b.pct-a.pct);
  const schoolPct = subRanked.length>0 ? Math.round(subRanked.reduce((s,v)=>s+v.pct,0)/subRanked.length) : 0;

  const cachedAdvice = (() => { try { return JSON.parse(localStorage.getItem('nm_school_advice')||'null'); } catch(e){return null;} })();
  const showAdvice = cachedAdvice && cachedAdvice.text && (Date.now()-cachedAdvice.ts < 7*24*3600*1000);
  const adviceBox = showAdvice
    ? `<div class="ai-advice-box">
        <div style="font-size:11px;font-weight:700;color:#F57F17;margin-bottom:8px">✨ AI ADMIN INSIGHTS</div>
        <div style="font-size:13px;line-height:1.6;color:#333;white-space:pre-line">${cachedAdvice.text}</div>
        <div style="margin-top:10px;font-size:11px;color:#aaa">Generated ${fmtDate(new Date(cachedAdvice.ts))} ·
          <span onclick="localStorage.removeItem('nm_school_advice');render()" style="cursor:pointer;text-decoration:underline">Regenerate</span>
        </div>
      </div>`
    : `<div class="ai-advice-box">
        <div style="font-size:11px;font-weight:700;color:#F57F17;margin-bottom:8px">✨ AI ADMIN INSIGHTS</div>
        <div style="font-size:13px;color:#888;margin-bottom:12px">Get AI-generated observations and recommendations for your school's performance.</div>
        <button id="gen-school-advice-btn" onclick="generateSchoolAdvice()" style="padding:8px 18px;font-size:13px;border:none;border-radius:8px;background:#1A1A1A;color:white;cursor:pointer">Generate Insights</button>
      </div>`;

  return `<div class="main p2-screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div><div class="p2-title">School Overview</div>
        <div class="p2-sub">${state.students.length} students enrolled · School-wide mastery: ${schoolPct}%</div></div>
      <button onclick="state.globalSas=null;render()" style="padding:6px 14px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:8px;background:white;cursor:pointer;color:#555">↻ Refresh</button>
    </div>

    ${programCard('Infant & Toddler (IT)','👶', itStudents, itActs, itStats, 'IT')}
    ${programCard('Early Childhood (EC)','🧒', ecStudents, ecActs, ecStats, 'EC')}
    ${adviceBox}
  </div>`;
}

async function generateSchoolAdvice() {
  const btn = document.getElementById('gen-school-advice-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  const apiKey = localStorage.getItem('nm_claude_key') || '';
  if (!apiKey) { alert('Add your Anthropic API key in Admin → AI Settings first.'); if(btn){btn.disabled=false;btn.textContent='Generate Insights';} return; }
  try {
    const allSts = state.students.map(s => {
      const sas = state.globalSas[s.id]||{};
      const acts = getActivitiesForProgram(s);
      const m = acts.filter(a=>sas[a.id]==='Mastered').length;
      const t = acts.length;
      return `${s.name} (${typeof s.program==='string'?s.program:''}): ${t>0?Math.round(m*100/t):0}% mastered`;
    }).join('\n');
    const prompt = `You are an educational consultant for Newton Montessori Preschool. Based on this student mastery data, provide 3-4 concise actionable insights for the admin. Focus on trends, opportunities, and specific recommendations. Keep it under 200 words.\n\nStudent data:\n${allSts}`;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:400, messages:[{role:'user',content:prompt}] })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || 'No insights generated.';
    localStorage.setItem('nm_school_advice', JSON.stringify({text, ts:Date.now()}));
    render();
  } catch(e) { alert('Failed to generate insights: ' + e.message); if(btn){btn.disabled=false;btn.textContent='Generate Insights';} }
}

    <div class="p2-section-title">📅 Suggested Week (${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})})</div>
    <div class="planner-week" style="margin-bottom:24px">

async function generateLessonAdvice(studentId) {
  const btn = document.getElementById('gen-plan-btn');
  if (btn) { btn.disabled=true; btn.textContent='Thinking…'; }
  const apiKey = localStorage.getItem('nm_claude_key')||'';
  if (!apiKey) { alert('Add your Anthropic API key in Admin → AI Settings first.'); if(btn){btn.disabled=false;btn.textContent='Ask Claude';} return; }
  try {
    const student = state.students.find(s=>s.id===studentId);
    if (!student) return;
    const sas  = state.globalSas[studentId]||{};
    const acts = getActivitiesForProgram(student);
    const summary = acts.map(a => `${cleanName(a.name)} [${a.subject}]: ${sas[a.id]||'Not started'}`).join('\n');
    const prompt = `You are a Montessori teacher assistant. ${student.name} is ${student.ageDisplay||'a preschooler'} in the ${typeof student.program==='string'?student.program:''} program.\n\nHere is their current curriculum progress:\n${summary}\n\nProvide 3-4 specific, practical recommendations for the teacher this week. Focus on sequencing, areas needing attention, and activities to introduce. Keep it concise and actionable (under 150 words).`;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:350, messages:[{role:'user',content:prompt}] })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text||'No advice generated.';
    localStorage.setItem('nm_plan_'+studentId, JSON.stringify({text, ts:Date.now()}));
    render();
  } catch(e) { alert('Failed: '+e.message); if(btn){btn.disabled=false;btn.textContent='Ask Claude';} }
}

// ── Assessment Scheduler ───────────────────────────────────────────────
function renderAssessments() {
  if (!state.globalSas) {
    loadAllSasData().then(() => render());
    return `<div class="loading"><div class="spinner">⟳</div><p style="margin-top:16px">Loading assessment data…</p></div>`;
  }

  const student = state.students.find(s => s.id === state.assessStudentId);

  if (!student) {
    const filter   = (state.assessStudentFilter||'').toLowerCase();
    const filtered = state.students.filter(s => !filter || s.name.toLowerCase().includes(filter));
    return `<div class="main p2-screen">
      <div class="p2-title" style="margin-bottom:4px">Assessment Scheduler</div>
      <div class="p2-sub" style="margin-bottom:20px">Select a student to view assessment plan</div>
      <input id="assess-search" value="${state.assessStudentFilter||''}" placeholder="Search students…"
        oninput="state.assessStudentFilter=this.value;render()"
        style="width:100%;max-width:360px;padding:9px 12px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box">
      <div>${filtered.map(s => {
        const sas = state.globalSas[s.id]||{};
        const acts = getActivitiesForProgram(s);
        const readyCount = acts.filter(a=>sas[a.id]==='Working Well').length;
        const prog = typeof s.program==='string'?s.program.replace('Infant & Toddler','IT').replace('Early Childhood','EC'):'';
        return `<div class="student-select-item" onclick="state.assessStudentId='${s.id}';render()">
          <div style="width:36px;height:36px;border-radius:50%;background:#F9C522;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1A1A1A;flex-shrink:0">${s.name[0]}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600;color:#1A1A1A">${s.name}</div>
            <div style="font-size:11px;color:#888">${s.ageDisplay||''} · ${prog}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;color:#F57F17">${readyCount}</div>
            <div style="font-size:10px;color:#aaa">ready</div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  const sas       = state.globalSas[student.id]||{};
  const acts      = getActivitiesForProgram(student);
  const readyActs = acts.filter(a => sas[a.id]==='Working Well').sort((a,b)=>a.seq-b.seq);
  const mastActs  = acts.filter(a => sas[a.id]==='Mastered').length;
  const prog      = typeof student.program==='string'?student.program.replace('Infant & Toddler','IT').replace('Early Childhood','EC'):'';

  // Build calendar
  const [yr, mo] = (state.assessMonth||'').split('-').map(Number);
  const today    = new Date();
  const dispYear = yr||today.getFullYear(), dispMo = (mo||today.getMonth()+1)-1;
  const firstDay = new Date(dispYear, dispMo, 1).getDay(); // 0=Sun
  const daysInMo = new Date(dispYear, dispMo+1, 0).getDate();
  const monthName= new Date(dispYear, dispMo, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});

  // Assign assessment days: spread readyActs across Tue & Thu of the month
  const assessDays = {}; // dayNum → activity
  const tueThu = [];
  for (let d=1; d<=daysInMo; d++) {
    const dow = new Date(dispYear, dispMo, d).getDay();
    if (dow===2||dow===4) tueThu.push(d); // Tue=2, Thu=4
  }
  readyActs.forEach((a, i) => {
    if (tueThu[i]) assessDays[tueThu[i]] = a;
  });

  const blanks = firstDay; // 0=Sun, adjust to Mon-start
  const calCells = [];
  for (let i=0; i<blanks; i++) calCells.push(null);
  for (let d=1; d<=daysInMo; d++) calCells.push(d);

  const todayNum = today.getFullYear()===dispYear && today.getMonth()===dispMo ? today.getDate() : -1;

  return `<div class="main p2-screen">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button onclick="state.assessStudentId=null;state.assessStudentFilter='';render()" style="padding:6px 12px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:8px;background:white;cursor:pointer;color:#555">← Back</button>
      <div>
        <div class="p2-title">${student.name}</div>
        <div class="p2-sub">${student.ageDisplay||''} · ${prog} · ${mastActs} mastered · ${readyActs.length} ready for assessment</div>
      </div>
    </div>

    <!-- Ready for assessment -->
    <div class="p2-section-title" style="margin-bottom:10px">✅ Ready for Assessment (Working Well → Mastered)</div>
    ${readyActs.length === 0
      ? `<div style="background:#F9F9F9;border-radius:10px;padding:16px;color:#888;font-size:13px;margin-bottom:20px">No activities currently at "Working Well" — keep introducing new material!</div>`
      : `<div style="margin-bottom:20px">
          ${readyActs.slice(0,10).map(a => `
            <div class="assess-item">
              <div style="width:10px;height:10px;border-radius:50%;background:${subjColor(a.subject||'Other')};flex-shrink:0"></div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;color:#1A1A1A">${cleanName(a.name)}</div>
                <div style="font-size:11px;color:#888">${a.subject||''}</div>
              </div>
              <div style="font-size:11px;color:#F57F17;font-weight:600">Working Well</div>
            </div>`).join('')}
          ${readyActs.length>10?`<div style="font-size:12px;color:#aaa;padding:8px">+${readyActs.length-10} more activities ready</div>`:''}
        </div>`}

    <!-- Calendar -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div class="p2-section-title" style="margin-bottom:0">📅 ${monthName}</div>
      <button onclick="const d=new Date(${dispYear},${dispMo}-1,1);state.assessMonth=(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));render()"
        style="padding:4px 10px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:6px;background:white;cursor:pointer">‹</button>
      <button onclick="const d=new Date(${dispYear},${dispMo}+1,1);state.assessMonth=(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));render()"
        style="padding:4px 10px;font-size:12px;border:1.5px solid #E0E0E0;border-radius:6px;background:white;cursor:pointer">›</button>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
      ${calCells.map(day => {
        if (!day) return `<div class="cal-day" style="border:none;background:transparent"></div>`;
        const isToday   = day===todayNum;
        const isAssess  = !!assessDays[day];
        const act       = assessDays[day];
        return `<div class="cal-day${isAssess?' has-assess':''}${isToday?' today-cell':''}">
          <div class="cal-day-num">${day}</div>
          ${isAssess ? `<span class="cal-dot" style="background:${subjColor(act.subject||'Other')}"></span>
            <div style="font-size:9px;color:#666;margin-top:2px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cleanName(act.name)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
    ${readyActs.length > 0 ? `
    <div class="ai-advice-box" style="margin-top:16px">
      <div style="font-size:12px;color:#888;font-weight:600">📌 Assessment tip:</div>
      <div style="font-size:13px;color:#555;margin-top:6px">Suggested schedule places assessments on Tuesdays and Thursdays — lighter activity days. Observe each activity in a 3-part lesson context before marking Mastered.</div>
    </div>` : ''}
  </div>`;
}

// ── Init ───────────────────────────────────────────────────────────────
// Require both a saved token AND a valid teacher identity before auto-loading.
// If only the token is present (after logout or a failed login), show the login screen.
initHandlers(); // attach static tab listeners exactly once — never re-added on render()
if (state.token && state.teacherRecordId && state.teacherName) {
  loadData();
} else {
  render();
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// LOG MATRIX — window-level functions (called via inline onclick)
// ═══════════════════════════════════════════════════════════════════════
window._lmStatus = {};  // actId -> selected status
window._lmCtx    = {};  // actId -> selected context

window.lmSelectStatus = function(actId, val) {

  ['Presented','In Progress','Working Well','Mastered'].forEach(function(v) {

    var isSel = v === val;
    btn.style.borderColor  = isSel ? '#F9C522' : '#E0E0E0';

// ── Inject global overlays into document body (outside #app scroll container) ──
function renderGlobalOverlays() {
  var el = document.getElementById('nm-global-overlays');
  if (!el) {
    el = document.createElement('div');
    el.id = 'nm-global-overlays';
    document.body.appendChild(el);
  }
  el.innerHTML = renderRevertConfirmOverlay();
}

// ── Render confirmation modal for status revert ─────────────────────────────
function renderRevertConfirmOverlay() {
  var rc = state.revertConfirm;
  if (!rc) return '';
  var lvlOrder = ['Presented', 'In Progress', 'Working Well', 'Mastered'];
  var prevIdx = lvlOrder.indexOf(rc.prev);
  var revertTo = prevIdx > 0 ? lvlOrder[prevIdx - 1] : null;
  var statusColors = {
    'Presented':   { bg:'#E3F2FD', border:'#1565C0', color:'#0D47A1' },
    'In Progress': { bg:'#FFF3E0', border:'#E65100', color:'#BF360C' },
    'Working Well':{ bg:'#FFFDE7', border:'#F57F17', color:'#E65100' },
    'Mastered':    { bg:'#E8F5E9', border:'#2E7D32', color:'#1B5E20' }
  };
  var sc = statusColors[rc.prev] || { bg:'#F5F5F5', border:'#999', color:'#333' };
  var actionMsg = revertTo
    ? 'This will revert the status from <strong>' + rc.prev + '</strong> to <strong>' + revertTo + '</strong>.'
    : 'This will completely remove the <strong>' + rc.prev + '</strong> status.';
  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:14px;width:100%;max-width:420px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <div style="width:38px;height:38px;border-radius:50%;background:#FFF3E0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">⚠️</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:#1A1A1A">Remove progress status?</div>
            <div style="font-size:12px;color:#888;margin-top:2px">This action will be logged in the history</div>
          </div>
          <button onclick="state.revertConfirm=null;render()" style="margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px">✕</button>
        </div>
        <div style="background:#F9F9F9;border-radius:8px;padding:10px 14px;margin-bottom:14px">
          <div style="font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">Activity</div>
          <div style="font-size:13px;font-weight:600;color:#1A1A1A">${rc.actName}</div>
        </div>
        <div style="background:${sc.bg};border:1px solid ${sc.border};border-radius:8px;padding:10px 14px;margin-bottom:16px">
          <div style="font-size:12px;color:${sc.color};line-height:1.6">${actionMsg}</div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="state.revertConfirm=null;render()"
            style="font-size:13px;padding:8px 16px;background:none;border:1px solid #DDD;border-radius:6px;cursor:pointer;color:#555">Keep status</button>
          <button id="revert-confirm-btn" onclick="executeStatusRevert()"
            style="font-size:13px;padding:8px 20px;background:#FFEBEE;border:1px solid #EF9A9A;border-radius:6px;cursor:pointer;color:#B71C1C;font-weight:700">
            Yes, remove
          </button>
        </div>
      </div>
    </div>`;
}

// ── Execute the confirmed status revert ──────────────────────────────────────
window.executeStatusRevert = async function() {
  var rc = state.revertConfirm;
  if (!rc) return;
  var btn = document.getElementById('revert-confirm-btn');
  if (btn) { btn.textContent = 'Removing…'; btn.disabled = true; }

  var actId = rc.actId;
  var prev = rc.prev;
  var act = state.activities.find(function(a){ return a.id === actId; });
  var student = state.reviewStudent || state.selectedStudent;
  if (!act || !student) { state.revertConfirm = null; render(); return; }

  var lvlOrder = ['Presented', 'In Progress', 'Working Well', 'Mastered'];
  var prevIdx = lvlOrder.indexOf(prev);
  var revertTo = prevIdx > 0 ? lvlOrder[prevIdx - 1] : null;
  var sasRec0 = (state.reviewStatuses || []).find(function(r){ return r.activityId === actId; });
  var todayStr = todayET();

  state.revertConfirm = null;

  if (revertTo) {
    state.statusMap[actId] = revertTo;
    state.reviewStatuses = (state.reviewStatuses || []).map(function(r){
      return r.activityId === actId ? Object.assign({}, r, {status: revertTo}) : r;
    });
    render();
    try {
      var cf2 = {};
      cf2[FIELD.prStudent]  = [student.id];
      cf2[FIELD.prActivity] = [actId];
      cf2[FIELD.prStatus]   = revertTo;
      cf2[FIELD.prDate]     = todayStr;
      cf2[FIELD.prNotes]    = 'Reverted from ' + prev;
      if (state.teacherRecordId) cf2[FIELD.prRecordedBy] = [state.teacherRecordId];
      await airtable(TABLES.progress, { method:'POST', body: JSON.stringify({ records:[{fields:cf2}] }) });
      if (sasRec0 && sasRec0.sasRecordId) {
        var pf2 = {}; pf2[FIELD.sasCurrent] = revertTo; pf2[FIELD.sasUpdated] = todayStr;
        await airtable(TABLES.status + '/' + sasRec0.sasRecordId, { method:'PATCH', body: JSON.stringify({fields:pf2}) });
      }
    } catch(e) {
      state.statusMap[actId] = prev;
      state.reviewStatuses = (state.reviewStatuses || []).map(function(r){
        return r.activityId === actId ? Object.assign({}, r, {status: prev}) : r;
      });
      render();
    }
  } else {
    state.statusMap[actId] = null;
    state.reviewStatuses = (state.reviewStatuses || []).filter(function(r){ return r.activityId !== actId; });
    render();
    try {
      var cf3 = {};
      cf3[FIELD.prStudent]  = [student.id];
      cf3[FIELD.prActivity] = [actId];
      cf3[FIELD.prStatus]   = prev;
      cf3[FIELD.prDate]     = todayStr;
      cf3[FIELD.prNotes]    = 'Status removed';
      if (state.teacherRecordId) cf3[FIELD.prRecordedBy] = [state.teacherRecordId];
      await airtable(TABLES.progress, { method:'POST', body: JSON.stringify({ records:[{fields:cf3}] }) });
      if (sasRec0 && sasRec0.sasRecordId) {
        await airtable(TABLES.status + '/' + sasRec0.sasRecordId, { method: 'DELETE' });
      } else {
        var ck2 = student.brightwheel + '-' + act.stableId;
        var all2 = await fetchAll(TABLES.status, [], null);
        var m2 = all2.find(function(r){
          return (r.fields['composite_key'] || r.fields[FIELD.sasCompositeKey] || '') === ck2;
        });
        if (m2) await airtable(TABLES.status + '/' + m2.id, { method: 'DELETE' });
      }
    } catch(e) {
      state.statusMap[actId] = prev;
      if (sasRec0) state.reviewStatuses = (state.reviewStatuses || []).concat([sasRec0]);
      render();
    }
  }
};

window.lmQuickStatus = async function(actId, newStatus) {
  var act = state.activities.find(function(a){ return a.id === actId; });
  if (!act) return;
  var student = state.reviewStudent || state.selectedStudent;
  if (!student) return;
  var prev = (state.statusMap && (actId in state.statusMap)) ? (state.statusMap[actId] || '') : '';
  if (!prev) {
    // If not in statusMap, fall back to reviewStatuses
    var sl0 = (state.reviewStatuses || []).find(function(r){ return r.activityId === actId; });
    if (sl0) prev = sl0.status || '';
  }
  // Toggle off: clicking the same status — show confirmation modal first
  if (prev === newStatus) {
    state.revertConfirm = { actId: actId, newStatus: newStatus, actName: cleanName(act.name), prev: prev };
    render();
    return;
  }
  // Optimistic update (render wrapper auto-preserves scroll)
  state.statusMap[actId] = newStatus;
  render();
  var date = state.assessmentDate || todayET();
  try {
    var fields = {};
    fields[FIELD.prStudent]  = [student.id];
    fields[FIELD.prActivity] = [actId];
    fields[FIELD.prStatus]   = newStatus;
    fields[FIELD.prDate]     = date;
    if (state.teacherRecordId) fields[FIELD.prRecordedBy] = [state.teacherRecordId];
    await airtable(TABLES.progress, { method:'POST', body: JSON.stringify({ records:[{fields:fields}] }) });
    var compositeKey = student.brightwheel + '-' + act.stableId;
    var existing = await fetchAll(TABLES.status, [], null);
    var match = existing.find(function(r){
      return (r.fields['composite_key'] || r.fields[FIELD.sasCompositeKey] || '') === compositeKey;
    });
    if (match) {
      var pf = {}; pf[FIELD.sasCurrent] = newStatus; pf[FIELD.sasUpdated] = date;
      try {
        await airtable(TABLES.status + '/' + match.id, { method:'PATCH', body: JSON.stringify({fields:pf}) });
      } catch(patchErr) {
        // Record was deleted (toggle-off race) — create a fresh SAS record instead
        var nf2 = {};
        nf2[FIELD.sasStudent]      = [student.id];
        nf2[FIELD.sasActivity]     = [actId];
        nf2[FIELD.sasCurrent]      = newStatus;
        nf2[FIELD.sasUpdated]      = date;
        nf2[FIELD.sasCompositeKey] = compositeKey;
        await airtable(TABLES.status, { method:'POST', body: JSON.stringify({records:[{fields:nf2}]}) });
      }
    } else {
      var nf = {};
      nf[FIELD.sasStudent]      = [student.id];
      nf[FIELD.sasActivity]     = [actId];
      nf[FIELD.sasCurrent]      = newStatus;
      nf[FIELD.sasUpdated]      = date;
      nf[FIELD.sasCompositeKey] = compositeKey;
      await airtable(TABLES.status, { method:'POST', body: JSON.stringify({records:[{fields:nf}]}) });
    }
  } catch(e) {
    state.statusMap[actId] = prev; // revert on error
    render();
    alert('Could not save status: ' + e.message);
  }
};

window.lmCancel = function() {
  state.expandedActivityId = null;
  render();
};

window.lmSave = async function(actId) {
  var status = window._lmStatus[actId];
  if (!status) { alert('Please select a status first — tap one of the four coloured buttons.'); return; }
  var notes   = (document.getElementById('lognotes-' + actId) || {}).value || '';
  var date    = state.assessmentDate || todayET();
  var saveBtn = document.getElementById('lmsavebtn-' + actId);
  if (saveBtn) { saveBtn.textContent = 'Saving…'; saveBtn.disabled = true; }
  try {
    var act = state.activities.find(function(a) { return a.id === actId; });
    if (!act) throw new Error('Activity not found in list');
    var fields = {};
    fields[FIELD.prStudent]  = [student.id];
    fields[FIELD.prActivity] = [actId];
    fields[FIELD.prStatus]   = status;
    fields[FIELD.prDate]     = date;
    if (notes.trim())          fields[FIELD.prNotes]      = notes.trim();
    if (state.teacherRecordId) fields[FIELD.prRecordedBy] = [state.teacherRecordId];
    await airtable(TABLES.progress, { method: 'POST', body: JSON.stringify({ records: [{ fields: fields }] }) });
    var compositeKey = student.brightwheel + '-' + act.stableId;
    var existing = await fetchAll(TABLES.status, [], null);
    var match = existing.find(function(r) {
      return (r.fields['composite_key'] || r.fields[FIELD.sasCompositeKey] || '') === compositeKey;
    });
    if (match) {
      var patchFields = {};
      patchFields[FIELD.sasCurrent] = status;
      patchFields[FIELD.sasUpdated] = date;
      await airtable(TABLES.status + '/' + match.id, { method: 'PATCH', body: JSON.stringify({ fields: patchFields }) });
    } else {
      var newFields = {};
      newFields[FIELD.sasStudent]      = [student.id];
      newFields[FIELD.sasActivity]     = [actId];
      newFields[FIELD.sasCurrent]      = status;
      newFields[FIELD.sasUpdated]      = date;
      newFields[FIELD.sasCompositeKey] = compositeKey;
      await airtable(TABLES.status, { method: 'POST', body: JSON.stringify({ records: [{ fields: newFields }] }) });
    }
    // Clear selections for this activity
    delete window._lmStatus[actId];
    state.statusMap[actId]   = status;
    state.expandedActivityId = null;
    render();
  } catch(err) {
    if (saveBtn) { saveBtn.textContent = 'Save ✓'; saveBtn.disabled = false; }
    alert('Error saving: ' + err.message);
  }
};

// ═══════════════════════════════════════════════════════════════════════
// DAILY LOG — fetch progress records + observations for a date range
// ═══════════════════════════════════════════════════════════════════════
async function loadLogData(dateFrom, dateTo) {
  state.logLoading = true;
  state.logData    = null;
  render();
  try {
    const end = dateTo || dateFrom;
    // Fetch all Progress Records and General Observations (client-side date filter)
    // Ensure books are available for title resolution
    if (!state.booksLoaded && !state.booksLoading) {
      await loadBookLibrary();
    } else if (state.booksLoading) {
      await new Promise(resolve => {
        const _bt = setInterval(() => { if (!state.booksLoading) { clearInterval(_bt); resolve(); } }, 150);
      });
    }

    const [prRecs, obsRecs, rlRecs] = await Promise.all([
      fetchAll(TABLES.progress,   [], null),
      fetchAll(TABLES.generalObs, [], null),
      fetchAll(TABLES.readingLog, [], null),
    ]);

    const byStudent = {};

    // ── Process progress records ─────────────────────────────────────
    prRecs.forEach(r => {
      const d = r.fields['record_date'] || r.fields[FIELD.prDate] || '';
      if (!d || d < dateFrom || d > end) return;

      const studs   = r.fields['student']  || r.fields[FIELD.prStudent]  || [];
      const actIds  = r.fields['activity'] || r.fields[FIELD.prActivity] || [];
      const status  = r.fields['status']   || r.fields[FIELD.prStatus]   || '';
      const notes   = r.fields['observation_notes'] || r.fields[FIELD.prNotes] || '';
      const recBy   = r.fields['recorded_by'] || r.fields[FIELD.prRecordedBy] || [];
      const teachId = Array.isArray(recBy) ? (typeof recBy[0]==='object' ? recBy[0].id : recBy[0]) : '';
      const teachNm = (teachId && state.staffById && state.staffById[teachId]) || '';

      studs.forEach(sRaw => {
        const sid = typeof sRaw === 'object' ? sRaw.id : sRaw;
        if (!byStudent[sid]) byStudent[sid] = { statusUpdates: [], observations: [], readingLogs: [] };
        actIds.forEach(aRaw => {
          const aid = typeof aRaw === 'object' ? aRaw.id : aRaw;
          const act = state.activities.find(a => a.id === aid) || {};
          byStudent[sid].statusUpdates.push({
            activityId:   aid,
            activityName: act.name ? cleanName(act.name) : 'Unknown activity',
            subject:      act.subject || '',
            status,
            notes,
            date: d,
            teacherName: teachNm,
          });
        });
      });
    });

    // ── Process general observations ─────────────────────────────────
    obsRecs.forEach(r => {
      const d = r.fields['observation_date'] || r.fields[FIELD.goDate] || '';
      if (!d || d < dateFrom || d > end) return;

      const studs   = r.fields['student']     || r.fields[FIELD.goStudent]     || [];
      const notes   = r.fields['notes']       || r.fields[FIELD.goNotes]       || '';
      const recBy   = r.fields['recorded_by'] || r.fields[FIELD.goRecordedBy]  || [];
      const teachId = Array.isArray(recBy) ? (typeof recBy[0]==='object' ? recBy[0].id : recBy[0]) : '';
      const teachNm = (teachId && state.staffById && state.staffById[teachId]) || '';

      studs.forEach(sRaw => {
        const sid = typeof sRaw === 'object' ? sRaw.id : sRaw;
        if (!byStudent[sid]) byStudent[sid] = { statusUpdates: [], observations: [], readingLogs: [] };
        byStudent[sid].observations.push({ date: d, notes, teacherName: teachNm });
      });
    });

    // ── Process reading log records ──────────────────────────────────
    rlRecs.forEach(r => {
      const d = r.fields['log_date'] || r.fields[FIELD.rlDate] || '';
      if (!d || d < dateFrom || d > end) return;

      const studs      = r.fields['student']      || r.fields[FIELD.rlStudent]      || [];
      const bookLinks  = r.fields['book']         || r.fields[FIELD.rlBook]         || [];
      const actType    = r.fields['activity_type']|| r.fields[FIELD.rlActivityType] || '';
      const notes      = r.fields['teacher_notes']|| r.fields[FIELD.rlNotes]        || '';
      const recBy      = r.fields['recorded_by']  || r.fields[FIELD.rlRecordedBy]   || [];
      const teachId    = Array.isArray(recBy) ? (typeof recBy[0]==='object' ? recBy[0].id : recBy[0]) : '';
      const teachNm    = (teachId && state.staffById && state.staffById[teachId]) || '';
      const bookId     = Array.isArray(bookLinks) ? (typeof bookLinks[0]==='object' ? bookLinks[0].id : bookLinks[0]) : '';
      const bookObj    = state.books.find(b => b.id === bookId);
      const bookTitle  = bookObj ? bookObj.title : '';

      studs.forEach(sRaw => {
        const sid = typeof sRaw === 'object' ? sRaw.id : sRaw;
        if (!byStudent[sid]) byStudent[sid] = { statusUpdates: [], observations: [], readingLogs: [] };
        byStudent[sid].readingLogs.push({ date: d, bookTitle, activityType: actType, notes, teacherName: teachNm });
      });
    });

    state.logData    = byStudent;
    state.logLoading = false;
    render();
  } catch(e) {
    state.logData    = {};
    state.logLoading = false;
    state.error = 'Daily Log load error: ' + e.message;
    render();
  }
}

  return `<div class="main p2-screen">
    ${header}
    <div style="font-size:12px;color:#888;margin-bottom:16px">Activity for ${dateLabel}</div>
    ${totalUpdates === 0 && totalObs === 0 && totalReading === 0
      ? `<div style="background:#FFF8E1;border:1px solid #FFE082;border-radius:10px;padding:16px;text-align:center;margin-bottom:20px">
           <div style="font-size:14px;color:#795548">No activity was logged for this date range.</div>
         </div>`
      : kpiHtml
    }
    ${renderProgramRows('Infant &amp; Toddler', itStudents)}
    ${renderProgramRows('Early Childhood', ecStudents)}
    ${noActivityTotal > 0 && (totalUpdates > 0 || totalObs > 0)
      ? `<div style="font-size:12px;color:#bbb;text-align:center;padding-top:4px">
           ${noActivityTotal} student${noActivityTotal>1?'s':''} had no activity logged this period
         </div>` : ''}
  </div>`;
}
